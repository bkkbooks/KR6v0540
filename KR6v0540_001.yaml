秀島之西玉宇高寒碧瓦齊大澳霧濃連海濶鳳凰峰峻覺天低迷津指照聆三藏歸路扶持授一藜此日結緣成極樂再來許借上方棲寄懷昂平寶蓮寺明慧大師梁隱盦半里鐘聲半角僧一峯彌勒一龕燈光生般若無邊界人在華嚴第幾層偶過虎溪招惠遠還來鳳嶺笑孫登空山月照禪心靜島也新詩瘦未曾仲冬登法華塔即景智照法華塔峙寺門西向晚登臨望欲迷幾片輕烟橫斷岸二分新月照清溪雲埋遠岫羣羊下聲震長空一鶴歸珍重奚囊好詩料沉吟緩步語聲低登華嚴塔智照華嚴矗立鳳凰東一柱擎天氣象雄遠舶乘風穿巨浪殘暉倒影掛高松龕中淨供三尊佛檻角喧騰幾口鐘偶悟諸緣皆是幻從知四大也成空山居除夕智照七載淹留歲又除枯禪有味愛山居寒將破衲裁雲補饑借粗蔬當飯茹大事未明須學佛餘生已晚獨愁豫蘧然夢醒成今昔悟到無常念自攄送筏可和尚赴檀香山弘法七截八首明慧香海嶼山隆道場剎竿豎起不尋常萬千四衆皈依處主席誰膺戒定香其二領袖沙門三十年周遭殿閣毗雲連供僧千指無難色贏得宗風海外傳其三中華佛會聘書來求法殷殷許善哉一領袈裟飛錫去布毛侍者樂追陪其四杖履聞駐檀香山似是慈雲降世間此日人天爭供養淨瓶踢倒也為間其五彼邦文物最文明豐德豐於舍衛城三叩鐘聲登講座圓音演說解真乘其六輕舒慧眼鑑羣機隨順衆生歡喜時幾許慕名求墨寶揮毫寫出張遷碑其七如海深心轉巨輪菩提像教應時新重重法界原無礙外護陳公第一人其八時節因緣豈可忘不離文字託篇章謹將法句伽陀頌奉與吾師無量光和梁隱盦居士步栯堂禪師山居詩四十首原韵明慧大法東來照炬藜有為畢竟即無為欲除妄想徒增病趣向真如便是疵花木禪房山裏靜荊蓁外道路頭岐道家不解生滅法堪笑仙人服紫芝其二面壁九年少室棲一花五葉發曹溪無心豈問風幡動放眼當知物我齊幾許傢俬分散後那爭隻履去歸西休瞞耳目欺天下偷過禪關唱假雞其三淨土觀經觀日斜琉璃世界十方誇劫經八萬身猶鴿瞋習多生毒作蛇不用三祗修慧業自然九品證蓮花花開自性彌陀現海印發光燦錦霞其四下死工夫求悟道入門法法必須疑香嚴擊竹一何速長慶捲簾再已遲寶藏大開無不具衣珠明示在於斯參禪念佛多方便吃緊疑情我是誰其五百川歸納大海流不到波羅誓不休古廟香爐去自在閻王票據出誰鈎任教富貴誇金谷縱使詩書勝鄴侯善惡多般隨業轉皆由一念繫心頭其六因緣和合生諸法萬法皆空立假名晚課循聲持半偈曉鐘殘夢滿三城二時粥飯隨緣過一盞山茶掃葉烹無相修禪惟行直居家持戒在心平其七竹杖芒鞋尋劍客百域烟水歷嶒嶒秋風夢裏懷明月春暖枝頭解結冰五衆苑中栖野鹿四禪天外任飛鵬靈雲自見桃花後露出鋒芒霜氣稜其八智度善權為父母天魔外道衆塵勞菩提無樹空諸相世界轉輪入一毛十法交參凡聖混六根亂動鬼神號行於非道通佛道第一峯頭是妙高其九固然渡海須用筏到岸更需筏奚為法為執除施對治藥因病用處方醫捨身無我欣飼虎防意侵人忍縮龜煩惱菩提原不二誰知戒定即瞋癡其十維摩示病不思議祗為衆生多病憂白牯黧奴千百劫紅魚青磬幾生修捕螂打彈憐黃雀逐鵲居巢笑拙鳩能變聲聞無我相散花天女說風流十一面上無瞋真供養金剛功德豈能量三尊妙相菩提座五分法身戒定香翠竹青青原吸露黃花鬱鬱自欺霜意中且把梅花嗅春色無邊正向陽十二禪關重破尚隔重祇見簷花吐欲紅聽雁雲中聲裂帛疑蛇杯內影搖弓任教翳目成千幻不動須彌吹八風末後剎那超象外四維南北與西東十三與君同是有緣人禮佛添香法界熏人事滄桑多變幻世情今古亟紛紜親如鴒𩿦難相顧愛若鸞凰也失羣先把淨心求淨土是真行腳拜慈雲十四天台金色界清涼華藏莊嚴列上房獅子頻呻吼未已象王回顧蹴何狂六千乞士十心滿五衆高人一性忘無礙重重理事在回光返照對斜陽十五寶樹華林彌勒栽龍華三會記徘徊鷲頭嶺上花猶在雞足山中僧再來百衲袈裟傳佛印四王石鉢養禪胎正像末法因緣事五百年來信劫灰十六靈光獨耀脫根塵選佛場中有宿因體露真常誰作主心空及第過來人蓮花歷劫時而現貝葉翻經日又新塵塵剎剎皆般若應無所住了無垠十七為實施權方便門開權顯實歷晨昏一乘貝葉談真諦七卷蓮華示佛源既處化城離火宅更趨寶所覓金丸正觀無二歸元路花滿庭階月滿軒十八此心既不著心求何計教坊與酒樓四攝度生宜具足三輪說法認從頭能遊窟內真獅子自御車前大白牛空假中觀真俗諦背塵合覺聖賢流十九爐香寶篆結祥烟一會靈山尚儼然象國契經應壽世雞園歷劫已忘年名山占得留朝代彼岸同登渡海淵無礙粟中藏世界火坑深處有青蓮二十四生六道俱輪回說到無常世所哀徒過此生登鬼録何如托質入蓮胎功名傀儡埋塵土寒食丘墳奠酒杯雖得人身如幻夢迷時師度悟黃梅草一佛制沙門宿樹下山巔底事蓋茆茨五陰非有猶嫌纍四大本空何足悲十二因緣終老死三千世界亦摧危人天福報非吾願惟有光陰不可期草二古稀念佛吟居易秋興遊人感杜陵悟得因緣空自性儻來名利豈能繩辨才語録成糟粕知解禪機也葛藤一樹木樨香聞否問誰透出愛和憎草三青山不老為誰留榮辱悲歡合自求鳥倦還時知落日龍鍾到處見橫秋前塵過去鴛江水幻境依稀蜃海樓太息明珠虛一擲林間彈雀笑陏侯草四斷臂神光單得髓覓心何處將心安四卷天竺楞伽記三藏曹溪法寶壇梵軸翻前馱白馬經灰驗後棄黃冠拈花微笑當年事結集人天屬阿難草五頑石曾聞頭可點本來頑石不能言誰從五濁娑婆界得悟三空解脫門禪制毒龍垂跡象定安意馬息心猿逢場作戲無生旨法法何妨徹本源草六不兼雜樹栴檀林南部金洲海岸沉早有菩提明佛性了無色相發禪心露珠滴瀝行衣潤水月清華照地陰自涉江湖風浪後空山不見白雲深草七三千煩惱剛刀盡畢竟袈裟勝錦袍已忘生死塵了了誰留業識浪滔滔因指見月深深認轉識成智位位高悲智雙運龍天護春風十里發紅桃草八先照高山譬始陽龍宮華藏號經王誦來貝葉三千部及至曹溪一句亡鼻向撩天雙孔仰眉低拖地白毫長幾回珍重當頭棒大喝聲聲遍體涼草九傳燈五會原成古慧命如絲續尚存豈有斬貓為佛事幸毋以蠡測禪源花開座上銜青鳥桃熟山中獻白猿正法昌明雖已矣宗風大展待誰論三十丹霞燒佛木生烟取暖堂中布草氈巍峨絶頂浮屠塔冷冽寒清卓錫泉茶味問真前後試蒲團坐破古今傳請看嶺上松蘿月照讀殘碑不記年卅一俯瞰神洲歎陸沉無邊煩惱自侵尋多生結習如岩石一念回光滿地金籬外黃花留晚節叢中緑竹解虛心五天西竺尼河上遺教空留鶴樹林卅二穿衣吃飯尋常事豈計搬柴踏碓舂雲裏錫飛看解虎堂前鉢落咒降龍吟風落月幽房竹對境高山絶壑松聞道寒山蕭寺夜客船誰送幾聲鐘卅三破衲郎當且久安擎拳豎拂有何干鏡中已見頭絲換杯下空教淚酒乾流水行雲隨步易焚香掃葉會心難嫦娥也解知人意夜夜牀前對影寒卅四江湖浪跡成前夢萬縷牽纏一念消山花未落如相待海客頻來不費招古木蒼葱迷野徑飛烟隱約隔溪橋莫忘認取來時路免向山中問老樵卅五暮春三月杜鵑啼歸去聲聲落日低東土却嫌耽歲月西天不礙隔雲泥奈何木石心先死惟有薰蕕器不齊我欲乘風無住處松間明月照清溪卅六披緇剃髮出三途那個男兒是丈夫尚有鉗錘分金鐵已無沙汰別賢愚風清鸝唱庭前柏日暖礁生海底瑚東壁畫工傳畫意楞伽變相睒摩圖卅七曇花一現真如幻生死此身安足論白骨撑天傷戰國黃金滿地布祇園初心徑入三摩地九界皈依兩足尊四大雖空留慧劍休教魔外賊兒孫卅八羅漢已經梵行立更無來去在人間六通修自三無漏八正超於五不還已盡此生離苦海常隨佛學侍靈山大乘擔荷如來務著了袈裟豈是閒卅九我亦多生識字僧也曾負笈以題名既知生死為何事豈把虛名誤此生獅子林中無盡意龍華會上最多情與君細指河沙界萬境如如路坦平四十老僧布衲忘冬夏數十年來對日暉喜入法門如是住欣遊教海自知歸青山有幸尋杯渡雲水常存解錫飛分外不加毫末事尚留餘線補袈衣勘誤第二十七面第七行第卅五字下加隱字第六十五面第九行第草一字下加林字
