主歷然入衆三餐精粗須辦溪山各異終非究竟因緣雲月雖同未是到家消息個中不了寸香聊供同參自業兼修二課切須共到可住即住慎勿虛延欲行便行毋勞擬議須知負笈擔簦為明己事勿以形勞而少安勿以力倦而多懈雲堂禪堂要具規模無二自心自性何妨隨處提撕所有規條謹列於左本堂安單凡課誦坐香止靜等並隨禪堂規式日逐祗圖在外間遊者罰睡眠時談笑者罰近午到午飯隨衆近晚到晚餐隨衆晚到一宿次日午飯即行天雨待雨止有病待病愈衆中有不守清規者寮元善勸不聽即白衆查明白客堂遷單若不白衆徑自亂嚷亂罵者罰亂打者重罰隨喜出外久不歸堂者罰聞普梆不隨衆出坡者罰威儀不整肅者罰議論諸方知識長短好惡者罰好逞機鋒者罰過堂上殿不搭衣者罰遇有來踪詭異言辭閃爍人即須從細查問恐有匪徒託跡致啓禍端顢頇失察者罰甲戌年四月八日住持筏可重録厨房條規寸薪粒米當知來處之艱難滴水殘虀須念作時之非易既不肯暴殄於天物更當思調和夫衆口酸鹹適味香甘得宜慎重烹飪勿生輕忽以供養為懷不貪果腹雖隨衆作務常抱道心粥飯三時不得一朝失誤晨昏二課何妨數刻清修銘曰雪峰飯頭溈山典座古德芳風於今未墮攝爾狂心慎爾口過運水搬柴毋忘者個堂內坐禪堂外禪坐誰知傳衣不離碓磨故此行門佛天所喜求福則得造業則失勤謹廉隅求福之本偏衆懈怠造業之基謹遵規銘為此良師厨房共住者粥飯小食俱在厨下同衆甘苦概不許別處私食及私留鮮美自食者罰早課不上殿者罰竊取常住油米食物者倍罰出院菜頭洗切大衆菜辦齊等事一齊相幫不到者罰飯頭煮大衆粥飯洗鍋二飯相幫抬飯器推諉失事者罰貼案收拾客菜小火頭燒火雜務洗鍋留私菜者重罰雜務到庫房取客菜偷取私留者重罰出院厨房高聲大叫者罰飲酒賭博者重罰出院設齊日頭堂所剩腐菜晚粥再供大衆不得棄擲違者罰不得將滾湯潑地上傷蟲蟻命違者罰甲戌年四月八日住持筏可重録念誦規約古之叢林高蹈絶俗除祝釐外不通應酬正為大事不明剪爪不暇那肯應酬散其道念又若自未度何以度人故經云瑜伽一事乃登地菩薩利生之事非初心凡夫所宜然恐叢林淡薄缺乏所需衲子懈修法門衰減不得已乃略應念誦必也進壇生道場想對經像如對佛想誦其文思其義行其事踐其實必使身與口合口與心合不昏沉不散亂不懈怠不貪利知因果知慚愧兢兢業業若是則不期度人而自度人不期利益而自利益所謂人以財與我我以法與人等施無異猶可權為若不識字或不出聲而誦經若不觀想全無誠意而禮懺或身對尊像而目視他方或口誦經懺而心存別念如是必招現前叢林道衰未來自靈受苦使自利利他之法寶反成自誤誤人之罪案可不慎哉所有規條謹陳於左念誦人是日見牌上有名即沐浴潔淨入壇須身到眼到口到心到不得於誦經懺時夾雜間語不得於經懺歇後在壇戲談念誦時不得回頭轉腦看人看物須一心稱念字字分明不出聲者罰主法人不得散心妄想宜一一依文精誠作觀表白人不得急遽簡略宜一一依文次第宣誦其鐘鼓等宜莊重雅馴不宜繁碎經懺及施食等不得法事未竟先收佛像莊嚴器物施食要一一依文精誠結印誦咒作觀三業相應不得含糊彈舌急促了事白文亦然香燈要誠潔小心燈火燭香燭供果等倘落地者不用已供過者不用庫房要打點整理合用法物不得苟簡以上條約須信受遵守不然自取殃禍可不慎哉雲棲法彙云近日應赴者水陸頭尾相連經懺接續不斷求經次汲汲如選官開牌名忙忙如報喜經懺日盛則道業日微應緣者當自警也甲戌年四月八日住持筏可重録祝釋迦佛誕儀式農曆四月初八日早課祝聖客堂掛牌云午飯後兩序大衆師聞鐘聲齊詣大殿前稱揚聖號浴佛伏願佛日增輝法輪常轉時至鳴大鐘三下大衆齊詣殿前殿中先設花亭中供佛降生悉達太子小像於香湯盆內安二小杓維那師舉香讚住持拈香拜已維那至中拈香展具三拜己歸位唱云釋迦如來九龍吐水灌沐金軀維那舉法身咒衆同和唱住持在浴亭中太子降生像以右手持杓浴佛以次班首職事大衆同浴已念咒至浴完乃止大衆各歸本位維那長跪合掌高聲白安位文云恭聞法身現相祥光靄淨飯之宮化佛應真瑞氣擁迦維之國金軀生處便能一手指天寶體浴時遂感九龍吐水四方遍顧七步成蓮稱上下之獨尊受人天之交讚不戀王宮富貴直趣雪嶺修行十九學道出家三十降魔成佛演經至五千餘卷住世於八十多年開三乘方便之門導七趣菩提之路憶昔二千五百年前我佛降臨當今公元一九五六年來真風遠被衆生荷生成之德今辰竭慶賀之誠氷潔道場雲臻梵侶金盆高捧喜觀悉達太子之金容聖水頻傾仰見摩耶夫人之聖德欲覲我佛之光輝須仗雷音之唱和維那白竟舉偈衆和天上天下無如佛十方世界亦無比世間所有我盡見一切無有如佛者我今灌沐諸如來淨智莊嚴功德聚五濁衆生令離垢同證如來淨法身香花燈塗妙莊嚴供養如來法報化唯願慈悲受供養窮未來際作佛事衆和唱畢將佛聖像安回本位將一切供物器皿仍歸佛座前已維那舉供養讚畢三皈依竟各回本處浴佛經出大藏經明藏才字函清龍藏知字函準經所說先作方壇中以淨泥和香水作口桌一張敷浴床座上安浴盤盤內安小浴床床上供悉達太子像人各以二指取少許水浴佛口誦偈咒浴佛之水各自洗頭名吉祥水浴竟用棉拭潔仍供座上云是日大殿門口書聯云功圓萬德位證一乘是天中天扇真風於末世橫遍十方豎窮三際作聖中聖揭慧日於羣生祝釋迦佛成道十二月初八日客堂掛牌早課祝聖與佛誕日相同午梆佛前上供大衆齊集燒香傳爐住持上香維那舉讚齊念供養咒畢維那出班上香展具三拜長跪合掌高聲作白文云恭聞如來無量劫來成佛豈假進修為憫衆生日用不知示以先覺覺自覺他而成覺道世出世間而稱世尊闡一代之化儀遵先佛之遺軌坐菩提樹魔宮隱而無光現優曇花法輪熾然常轉故始喻初日先照而末示拈花正傳顧末裔之何知誦遺言而有惕於今月八日恭遇如來成道之辰現前大衆少伸供養所願色空明暗咸宣微妙法音蠢動含靈共證智慧德相白已一拜起具復位舉讚禪悅藏三稱畢回堂釋迦佛涅槃儀二月十五日佛示現涅槃客堂掛牌云是日聞鼓聲大衆師依派班次詣大殿禮釋迦如來涅槃禮讚文懺誦遺教經早粥後兩序排班挨次上殿住持說法畢誦經回堂至午梆上供儀式與成道日同唯換文云恭以能仁應世寂默證真廓千界以居尊撫四生而為子形隨物現元同非相之身教逐機興詎異無言之道爰自法輪再轉化迹彌隆半字初談譬擊蒙而靡倦百金後寄猶贖命以唯勤普令煩惱之儔安住如來之藏四心告滿三德云歸所謂不令一人獨得滅度皆以如來滅度而滅度之是故入於涅槃不可得而思議我等鶴林既遠悲痛失於前緣像法猶存忝恪遵於遺訓今值仲春之日緬懷北首之時澗藻溪蘋聊表薦羞之禮升香歎德少申哀慕之誠唯願洪慈俯垂昭鑒白已一拜起具復位舉讚禪悅藏三稱畢回堂是日書聯云順世無常囿於化者終於盡是名寂滅寓諸幻而返諸真又書大殿聯云大定恆常永住恆河沙劫圓機普應示現千百億身七藝文香港大嶼山寶蓮禪寺同戒録序釋筏可世尊成道說法最後於金河顧命在雙林鶴樹談常之時囑諸大弟子曰汝等當依波羅提木叉是汝等大師依此修行如佛在世無異所以楞嚴四種清淨明誨為修行妙莊嚴路法華四安樂行乃成就善行菩薩道如是攝律儀饒益善法諸大乘經莫不以戒為菩提本源是知受持此一戒者豈小因緣哉茲大嶼山之有寶蓮寺傳戒者乃紀公和尚於民國十三年自鎮江金山寺來駐錫此山四衆欣然為之蓋木屋三間曰大茅蓬從此坐禪接衆修行辦道效大徹之家風苦心孤詣抖擻精神二時清粥薄飯慘淡經營幾十載聚沙成塔而三寶殿妙相莊嚴皆紀老人之力也民十九戒期完後紀公以年老告退時諸山舉不慧以繼斯席自愧德薄才棉曷能勝任辭不獲已姑負其難以維現狀雖然一粥一飯又不知從何處來幸佛陀法力檀那財力使山門韋馱殿禪堂地藏殿大鐘次第落成繼續傳戒然丁茲法運垂秋之際有情習染熾盛之時欲得解脫火宅焚燒業纍縈纏之苦捨入我佛陀第一園林清淨地其誰能離苦得樂者哉本山自來二載傳戒一期俾香江環海有志出家之士得斯耳提面命我佛最後深慈護念護囑大悲心戒如大地長養一切諸善根成就一切諸善果吾儕相信此會諸善男子善女人等皆同值善本故不畏渡海風波登山跋踄同會高山平地一聽天風海濤共瞻釋尊毗盧舍那之慈光此又豈無緣乎惟願汝等求戒善人處今日之時代正好勤習勞動務農生活在農務中不廢持戒參禪念佛五分律云昔佛在毗舍離城時世饑饉生活維艱諸比丘白佛若聽我等種植可以足食佛言聽許昔百丈禪師一日不作一日不食正為當今佛子好模範汝等如是一心中方便勤莊嚴上報佛恩下濟有情始不負今日來山求戒之苦心若是則深有厚望諸來者也公元一九五四年秋節筏可識於嶼山丈室佛法與平等釋筏可夏威夷日僑佛教聯合會在一九五六年十二月八日舉行一個恭祝釋迦牟尼佛成道紀念大典柬請中華佛教會同人先後致意屆時務希蒞臨以表中西日佛教聯誼合作恭祝亦即為世界性聯誼也因此我們於是日偕中華佛教會同人前往國際電影院為臨時慶祝會場抵達時由日人法師迎入座位開會時由英人漢特大師引陪拈香行恭祝禮是日參加人數二千多衆異常融洽熱鬧如四海內外一合相我們今日與會國際人士站在這太平洋上夏威夷檀香山大家都得到平等自由法治中安居樂業有此良辰寶貴機會得與佛教大衆及各界親善人士歡天喜地同來慶祝那二千五百年前在印度迦毗羅衛國淨飯王宮悉達多太子生而聖明慈忍觀衆生苦犧牲世榮出家修道雪嶺餐風麻麥充飢不問寒暑因緣時節到來覩明星出現大徹大悟成無上菩提號釋迦牟尼佛為解脫衆生生老病死苦本自證無上平等真覺運無緣平等大悲心燃著救濟大夜沉沉的明燈提携引接一切有情衆生平等咸登覺岸下面就略為敘述佛陀與人接物平等解脫的真理一生佛平等怎樣叫做生佛平等呢生就是衆生凡含情抱識一切衆生六道皆名衆生何名六道天人阿修羅為三善道地獄鬼畜生為三惡道因為他都是隨著其善惡業緣受種種身數數轉故說名衆生先賢說鬼神沉幽愁之苦鳥獸懷猶越之悲諸天正樂修羅方瞋可以整心慮趣菩提惟人道能為人道處中凡聖可通所以諸佛皆於人道中成等正覺二階級平等怎樣叫做階級平等呢那就是印度種族差別一種階級專制分為四個種族一婆羅門此云梵胤掌其宗教典籍祭禮祈禱的專權二剎帝利此云王種貴族掌國家軍政的大權三毗舍此云商農此三是亞利安人四首陀此是奴役卑下的人永遠沒有機會參加宗教軍政的權益只有畢生做奴役胼手胝足聚落另外別開住處世代傳習奴役工作釋迦牟尼首先唱導四河入海同一鹹味四姓出家同名釋子人類苦樂賢愚的報感是業精神的安慰歸宿只有一個道理因是而說是法平等無有高下佛陀從降生出家成道說法為命衆生還復這個平等自在真理雖為人天師常與比丘僧衆同樣飯食時著衣持鉢入舍衛大城乞食於其城中次第乞已還至本處所問亦無貴賤貧富之分大悲益物為世福田隨緣利物行於等慈以六和法為僧衆團體同在一起的安居生活進行無諍三昧人中最為第一一身和同住二口和無爭三意和同悅四戒和同守五見和同解六利和同均釋迦世尊有一期間過夏與五百羅漢比丘在一石巖坐禪安居時有勝行長者獻一香果供佛佛自將此果分開片片分與五百漢羅比丘同時受用後來的人為敬仰佛陀這樣等慈分果同沾故名其巖曰片片佛陀在二千五百年前就有這樣共同和合團體人類平等相處道心融洽即是佛法在世間不離世間平等覺三怨親平等怎樣叫做怨親平等呢怨的意思就如被他人惡罵或痛打或陷害因此懷恨在心名怨親的意思就愛念於我或殷勤奉事或恭敬供養因此感情名親此二如水火不相容何以相處佛陀常說左手刀割右手塗香於此二人無有憎愛平等無二於往昔修忍辱行時被歌利王割截身體不生瞋恨安然如故知一切法無我得成於忍菩提薩埵消除一切魔障破除一切煩惱成就無量功德安慰無量衆生以大無畏的精神安忍下去就履險如平提婆達多常惱害佛陀然而佛陀恆慈念提婆達多佛陀常說以怨報怨怨終不已無爭無怨其怨自止自證無上道以此度衆生變娑婆為淨土轉寃家為親友因為在後五百歲鬥爭堅固的時期人類物欲與貪求瞋忿與殘忍虛僞與欺騙我大你小我强你弱隨時羅人的火網粉骨碎身的燋散安得世有昨日夜叉心今朝菩薩面夜叉與羅叉不隔一條線在這舉心動念一剎那間化干戈為玉帛珍寶變荊棘為宮殿勝林這不就是佛說當平心地則世界地一切皆平四師資平等怎樣叫做師資平等呢師即調御丈夫天人師又名接引導師皆佛陀名號調解降伏引令歸於正道故名大導師弟就弟子跟隨佛陀出家修道的人或在家受持奉行皈戒的人通名弟子從佛口生從法化生得佛法分名為佛子佛陀常說一切衆生有如來藏當如父如母如兄如弟如姊如妹如親如友恆為利益安樂生度脫心息滅惡念或問既言平等為甚唱言天上天下唯我獨尊答獨尊這箇田地本來離言說相即是真如絶待佛陀獨證獨到處所以說盡思共度量不能測佛智一功衆生照著佛陀的路線修行造道迎頭趕上亦得成佛無二無別佛陀言我是已成佛汝是來成佛波斯匿王有一次請佛及比丘僧入王宮受供養佛陀令大比丘僧衆次第往應供佛陀自在祇園裏隨處巡視各比丘所住寮房有病比丘呻吟喊叫的聲浪湧出來佛陀推開房門入看見病比丘臥著床狀甚苦惱不淨流便染著衣衫病者見世尊到想勉强掙扎起來佛陀止勿起而向病比丘言有人來照顧你們嗎病者說未有佛陀又問同住人有病你有不去照顧他嗎病者說未有佛陀慈愍柔和地的音聲說你們既為修道而來共住一處常應互助則善佛陀親自為病比丘洗潔身體更換除去不淨的衣衫使病者調息然後為病比丘說法病者聞法歡喜心開意解深感佛陀慈悲垂誨從此依法進道釋迦世尊嘗為諸弟子說四姓出家同為釋子應當互助為道八福田中視病福田最為第一五自他平等怎樣叫做自他平等呢自己一體的身語意業與他大衆的身語意業一總檢驗體察其行為動作語言清淨不故名自他平等諸惡莫作即斷一切惡衆善奉行即修一切善自淨其心意是為諸佛教由此離苦得樂人天勝福樂三乘菩提涅槃樂戒律有軌範三業離諸過患生善滅惡勝淨因緣因戒生定因定發慧三無漏學以戒為先人天三乘共稟所以說毗尼住世佛法得住世佛陀嘗教誡嚴謹諸弟子三業清淨能得解脫釋迦世尊一時作如是說告比丘大衆言汝等從來於如來身語意業看見有怎樣過失呢於是大衆同白佛陀言我等從昔已來於今然而觀見如來身語意業清淨乃至無有如毛塵許的過失正是明如日月燈一任有目者睹最勝業遍知色無礙自在救世大悲者自證無我教人無我自行清淨教人清淨這不就是佛陀表現自他平等同行同趣的真實道僑薩羅國有大惡人名央掘摩羅受邪師所惑要殺千人取指為為鬘匿王軍兵追捕亦無奈他何一日見其母來欲殺之佛陀大悲心即行在其前央掘摩羅乃棄母向佛追去佛陀徐步而行央掘摩羅猛力追亦不及乃喚曰瞿曇且住瞿曇即釋尊姓佛陀告言央掘摩羅吾住久已然而汝是不住央掘摩羅聞佛所說疑念問曰云何是你久住我不住呢佛即對央掘摩羅言我是正等覺常住淨戒故汝是邪惡行以是為不住央掘摩羅聞佛所說法如雷貫耳與佛抵抗之念到此力屈心轉摧伏歸投大覺世尊伏地懺悔佛復對央掘摩羅說如他己不異如己他亦然恕己可為喻勿殺勿教殺央掘摩羅從此處就放下屠刀便歸正道六結上來所講都是略為敘述釋尊應世度生為衆生解黏去縛愛護人羣等如一子為衆生說法教化轉邪歸正轉凡入聖佛法在世間不離世間覺世間行法等即如佛法等美利堅林肯總統解放黑人得到同一平等自由孫總理建國廢除不平等條約就是為世界民族履行平等基地因為世界大同就是衆生平等猶憶民國十年的期間孫總理帥府廣州時與胡漢民諸先生出巡西江遊鼎湖山寺書留一聯曰一切有情衆生平等總理於山林宴息字裏行間猶流露其平等風度理念與暢明佛理平等深望國際社會時代賢明人士及佛教同仁人同此心心同此理展揚愛護這平等真義康莊大道繼往開來東西南北地球人類一切有情衆生平等彼此和平相處用是莊嚴人間樂園幸福遊寶蓮寺排律莊子才癸巳歲三秋霜高白露寒我遊寶蓮寺寺在大嶼山青巒五六里一路水潺漫漸至耳目曠遺世出塵寰直向山上望山高入雲端少憩幽篁裏不聞人世喧再行六七里饑渴力疲殫忽覩觀音洞門