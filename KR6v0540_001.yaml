body:
  text: 筏可和尚鑑定半角僧明慧編一形勢大嶼山原屬廣東新安縣舊轄大鵬協鎮考新安縣志原名大漁山位於香港之西四面環海其面積比香港大一倍東至銀礦灣南至唐福水口西至大澳北至東涌東北角伸至汲水門西南角伸至雞翼角東抱坪洲車公島尼姑洲東南角接長洲石鼓洲南下小鴉洲大鴉洲西往澳門北環細磨刀大磨刀赤刺角島東望細交椅大交椅青洲燈塔至香港西摩星嶺東北角朝馬灣燈籠洲至青龍頭北望大小磨刀至青山東南繞南丫島鴨脷洲至香港仔西北向沙洲汀角赤灣馬洲大鏟灣至廣州虎門西南接中山斗門自公元一八九八年即大清光緒二十六年庚子歲七月一日起從深圳河以南包括大嶼山統稱為新租界以九十九年為期租與英國英文譯音亦稱大漁山譯意為爛頭島俗書漁為嶼至今讀嶼音仍作漁也山嶽方面以鳳凰山為主山拔海高三千六十五英尺合九百三十五公尺次為大洞山又名大東山高二千七百三十英尺合八百七十一公尺再次昂坪山又名彌勒山高二千四百六十二英尺合七百五十一公尺其餘大小羣峯高千餘數百英尺不等由主山起東連大東山白望山大蠔山鹿頸山大肘山南連鹿地塘望東山西連昂坪山百丈嶺鹿湖山薑山靈蝠山象山鳳山獅山虎山山峽方面東北有望東坑二白長沙欄東南有梅窩鹿地塘背澳長沙石壁分流西北有坑尾深窟牛凹龍井頭平原方面東南最寬廣相連為梅窩白望唐福長沙背澳西北相連為大澳二澳沙螺灣馬灣涌龍井頭尤其是以昂坪之高山平地為最特色道路方面高線由大澳碼頭石仔埗街起至吉慶街口過橫水渡經太平街永安街出鹽田過登高橋上嶼山初地南行至薑山石壁東行至鹿湖昂坪出東山法門至地塘仔北下東涌沿大東山繞白望牛牯嶺至梅窩低線由大澳碼頭過海至鹽田沿鳳山腳西行經二澳過分流石壁轉水口唐福背澳上鹿地塘至梅窩村落方面大澳南岸包括梁屋村南涌村番鬼塘村新村橫坑村沙田村禾坑村北山村大澳北岸包括石仔埗村深窟村散石灣村小村沙螺灣村散頭村二澳口連絡二澳村分流村宏貝村石壁村水口村唐福村背澳村老圍村新圍村銀礦灣包括梅窩涌口村鹿地塘村大地塘村白銀鄉村盲塘村連絡長沙欄二白村鹿頸村白望村爛頭營龍井頭村嶺皮村十塱村梅花村牛凹村高原上有地塘仔村昂坪村鹿湖村薑山村海峽方面東北汲水門海峽至香港西南爛頭海峽出海往澳門東面西南丫海峽至長洲坪洲海灣方面由大澳灣起東行經深窟沙螺灣東涌灣繞白望鹿頸灣至汲水門西行由汲水門至望東坑經竹篙灣至銀礦灣沿十塱貝澳灣至望東灣過長沙塘福水口由東灣至雞翼角轉西灣至二澳口泉瀑方面最長二澳水嘮嘈瀑布折疊十餘丈次為薑山瀑布直長六七丈其餘深窟瀑布東山瀑布銀坑瀑布以及大溪小澗等亦極有可觀池塘方面大澳寶珠潭番鬼塘薑山小潭萬丈布觀影潭大東山爛頭營游泳池東涌古城游泳池地塘仔游泳池大澳嶼山泳池龍岩寺水塘昂坪寶蓮寺水塘稔樹灣水塘石壁將完成大水塘礦質方面大澳梅窩兩處均有鹽田沙螺灣有鎢礦梅窩銀礦已廢尚存故址生産方面自然生産有紫貝天葵石仙桃仙鶴草蓼凋竹半楓荷山桔羅漢果山稔水楊梅野薑等可供藥物之用農作生産有稻穀蔬菜合掌瓜木瓜落花生番薯芋頭竹笋豆角等可供食物之用種植生産有松竹緑葵油加里桃李梅柚柑桔檸檬茶葉生薑等以及合時吊鐘花杜鵑花並各種花木海面生産以四月鰽白八月黃花為魚類之最大宗其餘鱗介各種水族常時皆有發現郊野原有黃麖山猪迓鷹斑鳩等鳥獸今已漸少發現居民方面在海灣水上聚居者多務漁業大澳梅窩兩處有務鹽業各處田土多務農業惟薑山鹿湖地塘仔昂坪四處乃佛堂叢聚之區大東山爛頭營是外國人天主教徒所居二名勝將軍石在大嶼山西岸有峯巒起伏處名為虎山乃大澳口之屏蔽山後舊有地藏廟在此今大澳警署建於山麓新建碼頭築成大路沿虎山南麓石仔埗古村入街市距虎山嘴倒行一百碼遠處有大石一塊靠在山腳近海斜坡石高約三丈像全身盔甲武士有頭有身有足臂以下至足踝不與斜坡相連人可從此空隙通過前面有突出部份極像不文之物相傳此石像向正對海斗門唐家灣後為該鄉紳耆延地師尋至該處發現石像不文之物極不雅馴乃將其毀去大半以正觀瞻云寶珠潭在大澳北岸虎山與獅山水口交界處有土丘墳起形圓如珠四泓碧水名為寶珠潭南向有古廟一間供奉楊侯王考其鑄鐘刻康熙三十八年造其錫香案刻咸豐十年堪稱古廟至光緒三年丁丑闔澳值事鄭榮貴等重修寶珠潭楊侯王廟碑云蓋聞祗園寶樹曾鋪長者之金蜀道浮屠尚待尊官之力則欲支大廈必使羣材朗矣我澳楊侯古廟歷創有年座擁嶼山大列岡巒之體勢澳環碧水極窮海島之縈回正是山川育秀寶藏興焉珠潭映輝福地名矣遐邇祈禱咸沐洪庥民物安阜均沾大德是以地因神而靈不特施威風於宋代廟得寶而顯猶本布法雨於海隅也云云廟門口刻石聯云擁鵲嶺而為屏靈鍾秀育控鳳山而作鎮物阜民康廟內花圃刻聯云檻外雲山開眼界窗前潭水活文機又聯云鳥欲娛人嬌語轉花如愛客笑顏開海心石牌在大澳口虎山頭對向海面有石牌一方突起站立海心石牌下乃最著名之白花魚所叢集蕃育之區有重逾數十斤一尾者大澳運動場在大澳石仔埗古村靠山處新闢運動場乃賽球場所前為勝覺苑佛堂左為洪聖古廟該廟每年均有演戲酬神之舉考其鑄鐘刻乾隆十一年造嘉慶七年重修一次道光二十一年重修一次光緒元年重修一次民國十八年重修一次皆有碑可據堪稱古廟茲録光緒元年鄭榮貴等重修碑文云蓋聞勝地波羅咸仰各關於南海粵都省會壯觀廟宇於西關奉御祭而永享春秋邀勒封而崇稱王聖間乎赫赫厥聲濯濯厥靈莫若洪聖之較著者也茲在石仔埗向有古廟建自前朝歷年已久牆垣傾塌風雨飄搖靈爽奚自憑依祀事曷貽誠敬亟宜修葺乃浩大之工程全仗捐題乃重新乎廟貌惟願行商遠客樂豫輸將凡來海舶魚舟隨緣布助云云廟內舊有長聯云洪恩汪濊聖澤傍流水陸慶安瀾更喜鯨海波恬黌帆風靜還祈商纏萬貫農獲千廂物阜民康歌廣利大地春回王圖運轉華夷欣勝利正當河山重秀國土中興從此鐵牡嚴扃銅駝穩健金鐘革鼓祝和平關帝古廟在大澳市場中心有武帝古廟三幢四楹左鄰一幢為天后廟貼鄰乃大澳鄉事委員會辦公處即原日居民協會舊址右鄰新建大澳酒店即原日之屯地衙門考該廟大清咸豐二年重修碑云本廟興創已計二百餘載自乾隆六年間為之重修始像廟貌至今約值百有餘年云又光緒二十九年總理李文著等第三次重修碑云溯此廟創建自明朝以來歷有三百餘載逮至乾隆六年咸豐二年重修二次云云可知該廟歷數百年堪稱古廟內有聯云與天地同參澳水匯流存浩氣崇古今永祀嶼山高峙凜丹心天后古廟在大澳市區郊外一帶鹽田向南邊鳳山腳下於清初順治時代建有古廟一間供奉天后道光十八年重修敕封太后元君該廟左右兩山雄峙面臨大海魚檣黌帆一望無際後接高山松林薈萃於乾隆年間在廟前築成四大幅鹽田廟之右側盡是禾田左為新村右為沙田村後為坑尾村至光緒二十一年第二次重修總理李慎培等刻碑云蓋集羣樂業固宜得地為先闢壤而居必以依神而主斯廟建於順治之年有北涌南山之佐護鹽田築於乾隆之歲環繞有太平永安之街衢地接鳳山秀脈座納獅嶺英華澳水蟠旋波恬浪靜揚帆拱向巒秀峰青人傑地靈民安物阜嘉慶年間海隅洋匪猖厥本澳獨保無虞云龍巖寺在大澳坑尾村獅山腳道家系統彭師傅黃修凡鍾復真及女士萬壽姑四人於民國十八年發起在此建廟一間名曰龍巖寺其派系由平海龍泉寺分支而來一連三幢寺前一帶鹽田遠瞻大海無涯寺左建芳名亭一座內有石碑刻捐資人姓名亭邊左上建龍口小廟一間下建食水塘一個供給部份水上居民食水之用松林茂盛花木扶疏廟內供奉有釋迦像觀音像彌陀像睡佛像彌勒像又有朱大仙像天后談公等神像尤其是以朱大仙為主每年三月建醮一次慶祝朱大仙誕又有符印令旗等物售與水上居民以為鎮煞純屬道家香火性質嶼山初地在大澳坑尾村登山處或由沙田村經鹽田禾田過坑有登高橋橋後有小牌坊矗立山麓即嶼山初地登山路徑一九五年並橋頭一段路乃筏可和尚發起建築嶼山初地四字署名岑學呂題背面直心是道四字乃筏可書前面岑學呂撰聯云風塵變異無停狀天海蒼茫一問津至一九五三年大澳紳耆發起在此建凉亭一座名曰第一亭亭下有小型浴池更衣處名為嶼山泳池亭面筏可撰聯云面前清溪次第濯往返小歇一時休陳從彬撰大澳坑尾凉亭碑記云大澳坑尾嶼山初步雙峰尖峙一澗激湍上連峻嶽重巒下接平槁流水俯視坑谷無數奇石縱橫平眺海洋一片碧波蕩漾聽淙淙之澗水盡滌塵心乘習習之山風全消俗氣泉甘而冽智者可濯可游景雅且幽騷人宜詩宜畫然而樹木疏落亭榭闕如倘值赤帝高張何堪熱曝或逢雨師驟降復感淋漓於是衆人建亭一倡衆君捐資相助乃砌石壆築兩月經營季春啓幕從此名山勝地因得亭而益彰遊客行人因得亭而可憩爰鐫此石用垂永代不湮因撰斯文以志當年所創雞翼角在大嶼山西南尖端形如雞翼伸出此地名為雞翼角東邊即東灣西邊即西灣東灣山上約三百英尺高處有炮壘廢址周圍二十餘丈高一丈牆厚五六尺從前有門現在全座湮沒在蔓草叢中西灣舊有觀音古廟戰時被日軍所毀廟側有石筍高約二丈大約數圍此地又名石筍村其石筍尖頭獨角部份已破故老相傳此石筍極像石犀牛此間田禾收割時屢次發現被牛偷喫某日有農夫看見將牛追逐至石筍處已失牛所在因此恍然悟為石犀牛作祟乃糾集農民將此石角毀破其怪始絶姑録此以存疑石響鐘在二澳東邊分流村山下有石一面四圍圓形石底通透扣之如鐘響叮噹音韵悠久又稱為叮噹石石麒麟墓在大澳坑尾三丫水山腳下有曾母墳墓四圍羣山環繞前向大海墳面亂石叢沓最奇者石尖上向地師稱之為麒麟吐火聞其後人即曾榕原屬大澳沙田村人乃香港九龍金邊的士公司創辦人云萬丈瀑在二澳東北由千餘尺山上瀉下長大瀑布一條此即水嘮嘈瀑布又名萬丈布或名萬丈瀑乃大嶼山第一長大飛泉但見迤邐婉延高十餘丈一折一疊形成許多小潭山上有慈恩寺一間建築頗為華麗原日名國興寺民國十九年法傳大師於此開山戰後由度輪法師改建最下處有深坑可透至大澳虎山下流原日深坑處有天然石鴨一雙如遊水狀聞說被外國人取去惜今不存石壁古文在大嶼山南鳳凰山腳近海處即石壁村乃東莞徐姓族人於此開村舊村在山麓供侯王廟一間新村在涌口建洪聖廟一間廟雖不廣堪稱古廟廟前涌口原有大圓石一顆合兩便山勢如二龍爭珠惜戰前某年遭山洪瀑發將石珠冲入大海現存廟傍石壁刻有甲骨文字四個每字大約七八寸雖經風雨剝蝕而字跡猶存一般學者皆未能證明為某字香港考古家曾在此發掘古物掘出有葡國製磁碟用具等數項又在東灣發掘有泥古碗石桌斧頭等物名流陳公哲有五言詩刻於石壁傍以紀其事云石筍矗東灣沉沙考玦環蘊藏多寶氣攻錯借他山