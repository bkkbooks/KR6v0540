園一連兩幢樓砌石欄別饒雅致民國十九年圓成比丘尼等購地建築蓮苑原名雲岩在地塘仔最右邊依山而建一連兩幢民國十八年道明慧持兩位比丘尼開山現由法光比丘尼主理改名蓮苑一九五六年重修普明禪院在大嶼山昂平高原昂平先有靜室以普明禪院為始創開山妙參老和尚弟子果修比丘尼於宣統元年在此結茅蓬又參觀清法師為師以究心法民國四年改建石屋一連三幢室前四邊廣場原擬闢作女叢林與鹿湖精舍相輝映後因大茅蓬寶蓮寺建立十方叢林大展宗風因此仍作靜室修持之所合德堂在昂平普明禪院左邊相貼民國七年妙參和尚弟子福修比丘尼於此創建覺道林在昂平普明禪院左鄰與合德堂一連三間民國十一年觀清法師弟子德道比丘尼創建蓮池精舍在昂平海天一境入牌坊轉右邊彌勒山腳下有大靜室一連三幢即蓮池精舍民國六年式如法師與圓超女士於此開山建築右傍彌勒山麓門前一帶花圃廣栽果木用人工結成石池以種蓮花因此號為蓮池門額石刻唵嘛呢吧彌吽六個梵字現由淨猷比丘尼主理悟覺在昂平蓮池精舍後便一連小室三間民國十三年觀音山凌雲寺智修師女弟子淡然尼到此創建右傍闢作菜圃果樹成林新築花几石路以利行人淡然師體肥胖笑口常開見者皆生歡喜栴檀林在昂平寶蓮禪寺對開右便正門對正華嚴塔民國三年儀真比丘尼於此創建至一九五三年重修加高地基上蓋岑樓清光緒舉人楊鐵夫題栴檀林三字橫額半角僧明慧書門聯云栴檀香風隨所住處常安樂林泉見性盡虛空界悉光明沙泉在昂平栴檀林左鄰民國六年定常比丘尼創建一連大小兩幢原名溪雲後改沙泉竺覺蓬在昂平沙泉後便南向法華塔木魚山宣統二年月卿比丘尼於此結小茅蓬後改建石屋靜安居原名香林在昂平竺覺蓬右鄰一連三幢民國十年德妙照燃兩位比丘尼於此同建門前花圃左邊菜園花木扶疏堂內霍仁生贈聯云靜意明心堪見性安居去妄自歸真圓溪在昂平彌勒山南向華嚴塔地勢圓凹溪水長流通過門前其聲淙淙四時皆聞音韵民國二十年福修比丘尼依本師妙參和尚指示地盤建築至一九五二年福修老尼首徒浩蓮重修一連三幢新築石路繞山而進路傍另闢菜圃種植兩傍果木雜樹垂蔭別成境界淡如西在昂平圓溪上層一連三幢民國二十五年雷州王佛莊女士於此購建仰德在昂平與淡如西相連建築同用牆壁原名極樂蓬民國十三年成福比丘尼創建至民國二十二年合淡如西修建改名仰德天平在昂平由仰德直上彌勒山腹內築石巖上建小室民國初年靈峰禪師於此結廬修隱處巖溪在昂平圓溪左邊下層左傍岩石溪水下流門前花圃林泉逸致一九五二年成福比丘尼於此購建妙香林在昂平左鄰岩溪一九五二年南海霍仁生居士與堅持比丘尼購屋作為別墅增建水月閣闢鳳凰池門前三株喬松蒼徑高古雜花生樹好鳥鳴喈室雅而精坐看白雲出岫洵屬雅人深致逸興為懷阿彌陀佛在昂平彌勒山溪澗高處民國十年揚州長生寺重興祖湖北人性蓮老和尚於此創建海仁法師於民國六年親近老和尚隨同到港徵募萬緣鋪長生寺佛金至大嶼山見香港氣候溫和乃於此結廬名為阿彌陀佛至民國十二年揚州弟子多人函請老和尚回長生寺命海仁看守及回揚後致函來港云因長生寺事繁未暇再來將阿彌陀佛靜室轉歸海仁法師管業慧明在昂平阿彌陀佛靜室左邊下層乃海仁法師學者龐女居士姊妹同建般若殿在昂平舍利塔後座民國十五年觀清法師弟子德能師於此創建內懸巨鐘一口人皆稱為鐘樓靜悟林在昂平靜安居對開廣場建築一連三幢民國二十八年創建現正殿及左邊兩座上蓋塌下尚存右幢及新建後座一間正殿牆壁石碑猶完整幸道比丘尼立碑文云蓋聞世間慘事三灾為害為最為極而颶風更慘若遇此者生命財産盡變為空行船渡海或葬魚腹之中平坦大陸或死危牆之下自民國十一年七月初七日本省經遭此害本山損失無量目不忍覩本常住幸道發願四月初八萬佛聖誕六月十九大悲觀音誕十一月十七阿彌陀佛誕每年念佛七三期夫此佛七乃是方便法門一人亦得至千萬人亦得但有常住一日一劫至萬劫一人住至萬千百人永遠不能毀此願力求佛信佛必得福報大灾化為小灾小灾化為無佛乃慈悲最善平等普遍一切度衆生於苦海引含識於涅槃但願同住大衆一心念佛依願奉行他方此土一切衆生感荷佛恩同占利樂消除無妄之災共享升平之福民國戊辰年淨悟林幸道立門前刻聯云闢土結茅廬隱蹟清心求靜樂居山環草舍拋名了性悟禪機娑羅精舍在昂平靜悟林左側原名法華禪院民國十七年精參大師創建一連兩幢一九五二年轉售與游性津女居士大加重修加建圍牆闢花圃菜園及左邊小室頗為壯麗娑羅精舍橫額乃摩訶衍山題了塵樂在昂平娑羅精舍右鄰民國二十年本覺大師女弟子慧海居士建一連兩幢與慧廣進禪兩尼同住一九五五年慧廣進禪等發起重修上蓋門前菜圃一帶禾田兩傍果木本覺大師原是陽江大洞山支派義和蓬在昂平了塵樂左鄰民國二十三年羅浮山相榮大師弟子覺禪比丘尼創建聯善堂在昂平了塵樂後便民國十八年妙參和尚弟子普修比丘尼建菩提閣在昂平栴檀林轉西便門前一帶花木民國十七年筏可和尚女弟子淨曉淨潔等同建致志蓬在昂平寶蓮寺右邊繞過山坡處一連兩座門前築石圍基以通山路民國十四年靜通比丘尼創建以供奉其師德壽比丘尼安居淨覺在致志蓬右鄰門前花圃民國二十六年浩山比丘尼創建小金山在昂平致志蓬右邊上層民國十七年蓮池精舍式如大師弟子曾容女士建蘭若林在昂平小金山右鄰民國二十年雷州銘生比丘尼建淨念佛在昂平聯善堂左便民國二十五年了寬比丘尼於此創建窮苦樂在昂平普明禪院右便上層民國二十三年雷州淨通比丘尼建一九五四年重修蓮苑在昂平蘭若林右鄰民國二十五年淨悟比丘尼建新築園在昂平菩提閣對開處民國二十五年信機尼胞姊李如女士創建今由信機尼主理一九五二年重修阿彌陀佛林在昂平寶蓮寺背後民國二十六年觀心比丘尼於此創建一連三幢原擬闢作女叢林現歸了凡大師為靜室門前刻石聯云壽光佛佛皆無量心性人人當了知如光在寶蓮寺淨行堂右鄰民國二十六年超道比丘尼與淨開女士同建今轉與淨卿比丘尼覺蓮苑在寶蓮寺地藏殿左背後民國二十六年淨悟比丘尼建戰後售與英人貝納祺律師將四邊地段闢作農場種植畜牧作為公餘別墅寶蓮禪寺香港新界最著名之十方叢林在於大嶼山昂平高原介於鳳凰山與彌勒山兩峯之間始創開山功行大德是大悅頓修悅明三位禪師三禪師俱中年出家志同道合初來昂平見半里高山平地四面皆山堪為十方道場於是刪蔓草除荊蓁先築小石屋次蓋大茅蓬十方雲水僧到此一粒同餐種山蔬置法器草創禪門模範至民國十三年紀修和尚由鎮江金山江天寺到港來山大衆懇請任十方叢林第一代主席由此改為寶蓮寺於是宗風遠播諸山輔翊不期而同住同參者數十人紀老首建大木屋作禪堂一切清規儀制悉依鎮江金山軌範民國十七年大殿落成供奉釋迦大佛及迦葉阿難二尊者金像以大殿右邊為丈室客堂民國十八年在大殿背後木屋側建五觀齊堂民國十九年秋期傳戒完滿後紀公老人春秋已高精神勞瘁訪覓繼任主席人選以便退居自辦生死大事經諸山長老會議公請屯門青山清凉法苑如是住筏可法師為住持筏師進院以來蕭規曹隨法席更為隆盛大轉法輪先在大殿前建護法韋馱殿並彌勒殿築妙湛總持大牌坊作山門自題寶蓮禪寺橫額在山前建妙法蓮華經塔在山後建羅漢塔民國二十四年在大殿左側建禪堂及東西兩便石圓門民國二十六年建地藏殿鑄地藏菩薩銅像重四百斤供養並鑄二千餘斤銅巨鐘一口又建安樂室為紀公老人宴息之所民國二十七年建指月堂由南洋請回玉佛一尊在大殿供奉發起在地藏殿樓下開辦嶼山佛學院以造就僧尼教育延請留港各法師居士任教授未幾而戰事蔓延香港大衆多往內地逃難寺內幸保安然至光復後在客堂禪堂門前建東西亭兩座一九五二年在大殿後建如是室退居一年增秀和尚暫攝住持至一九五三年復任住持建華嚴塔重修指月堂加建層樓將五觀堂改建為真香閣一九五六年增建貯水塘以備農禪種植每三年繼續秋期傳戒每年元月打禪七一次四月七月九月修建大悲法會各一次律禪教密淨五宗弘布諸方共仰中外馳名洵天然之道場乃佛國之勝地中外人士遊覽留題者不可勝紀山門有李公達撰聯云寶樹繞重樓周匝儼成極樂剎蓮花開法界萬方咸仰佛陀門又沙門融熙撰聯云寶山既入莫空回參大疑大悟小疑小悟頓疑頓悟漸疑漸悟蓮花化生非分外咦青色青光黃色黃光赤色赤光白色白光正殿覺琳老和尚撰聯云靈鷲恆常住蓮華歷劫香大殿柱懸筏可和尚撰聯云但願山河大地清淨本然悉成安樂土普為四恩三有至心一禮皈向法中王殿前劉承澤撰聯云入菩薩道場同霑法雨現維摩寶室永護慈雲香港佛學會送橫匾覺海澄圓四字禪堂內青山了幻贈聯云大冶爐金鐵何分有鉗錘便成法器選佛場智愚不別無妄想即是覺人客堂內懸南海李宗簡聯云曉閣清香生靜境夜堂疏磐發禪心四禪德釋紀修紀修老和尚大嶼山昂平寶蓮寺十方叢林開山第一代祖師原籍廣東四邑人少時負販沿街賣布光緒初年至廣東丹霞山發心出家由丹霞往羅浮山華首台受具足戒民國三年往鎮江金山江天寺掛搭任夜巡打更職十一年至民國十三年中山定佛比丘尼朝山至金山江天寺相與談論云欲回廣東定佛比丘尼以其清貧乃為其購船票及書函延其到大嶼山東涌地塘仔主持楞嚴壇老和尚到港後乘船到大嶼山因不識東涌登岸直至大澳隨即登山至鹿湖下紫竹林靜室歇宿適遇心空明新悅明諸長老相會懇其住持大茅蓬寶蓮寺開闢十方叢林老和尚以因緣時會辭不獲已默然承諾於是大衆皆大歡喜翌晨相率歡送至昂平就任登高一呼群山響應時開山大德大悅頓修悅明三人之靜室即現在廚房淨行堂合併歸寶蓮常住建木屋設禪堂效金山寺坐禪宗風民國十四年開始傳戒民國十七年建大殿在寧坡請金色莊嚴大佛像及迦葉阿難二尊者像當時諸山龍象皆來護法老和尚律人律己皆嚴脅不著席男女聞風皈依出家者不可數計至民國十九年戒期圓滿後公請筏可和尚繼任住持自行退休民國草七年示寂荼毗後得舍利子一小杯如芝麻黑色釋妙參妙參老和尚原籍廣東陽江容氏子年十六領鄉秀才設孰授童蒙年十九遊羅浮山至朝元洞訪延祥寺禮寶積寺海老和尚出家年二十一往南京寶華山隆昌寺求浩淨律師受具足戒受戒時曾見地藏菩薩像顯應及戒期畢即往金山江天寺坐禪三年二十四歲返羅浮山重興延祥寺闢作十方叢林恭請元亨和尚任住持至宣統年間重至外省到安徽九華山重修地藏菩薩肉身道場完滿後再返羅浮時地方土匪猖獗難以安居乃聯同師友等往港求暫息之地初在香港中環士丹頓街設延祥分院以為師友棲息之所時元朗觀音山有靜室一間原屬明朝某皇姑修建供奉母親長生牌位中座安文武二帝乃鄉紳鄧伯球管理鄧氏原信奉基督將該靜室作別墅修養及妙參和尚至觀音山將鄧氏說服願將該靜室獻出改建為現今之凌雲寺又得港督金文泰贊助迅速完成儼然佛教道場又當時屯門青山寺之前身原屬純陽仙觀乃先天道信徒道場妙參和尚乃將其男住持說服隨諦間法師出家法名顯奇即青山寺開山第一代祖師其女住持名金姑太墨守成法不願出家落髮妙參和尚見之求其布施金姑太問其所求何物皆可施與妙參和尚謂願得金姑太之頭髮以作佛事金姑太乃悟遂隨顯奇和尚剃髮出家後往九華山求受具足戒至今青山寺遂成名山名剎妙參和尚同時又在觀音山建圓通寺及紫竹林度男女信徒四五千人其女徒觀修在南洋建千佛塔亦度信徒過千人民國十三年來大嶼山在寶蓮寺牌坊正門左側即現在禾田處建四老蓬與紀修觀清顯奇共稱諸山四老預為後來同參同住現已毀去又輔紀修和尚傳戒任監寺公議大嶼山青山觀音山每年輪流傳戒民國十六年合併觀音山在寶蓮寺舉行是年倡建寶蓮寺大佛殿以妙老出力最多後返觀音山凌雲寺留偈在韋馱殿自行下山年六十八因腦病至廣州北門徵求如來庵當家借地方圓寂入棺在白雲山火化是日男女送棺至北門外白雲庵觀荼毗者數千人途為之塞後凌雲寺將其留偈供奉偈曰十八年來住此山白雲飛去又飛翻我今拜別辭雲去天緣有份再回還釋慈謙慈謙長老廣東南海人忘其姓父名亦喜在鄉中經營藥材店長老年十八悟世無常離父出家受戒後往鎮江金山寺及揚州高旻寺參禪朝禮四大名山向在韶關芙蓉山靜室自誦法華經數十年時五嶺南北迭罹兵鏑而芙蓉山適當要衝為避兵亂故乃間關來港初在大澳虎山地藏廟與觀清法師同住同參二三年至民國十六年在昂平阿彌陀佛靜室住八年時觀清法師已住持鹿湖純陽仙院大展宗風長老乃應邀在鹿湖居一小靜室年已七十高齡每日必誦法華經兩部寒暑不輟屆八十四歲三月告人曰這個月內若無人死則他死果自知時至端坐安詳而寂荼毗時有白煙從口而出化成金色佛像冉冉升空而沒其徒淨勤師收取舍利帶往韶關芙蓉山靜室供奉淨勤師亦苦行誦華嚴經曾朝禮四大名山及十小山祁山亦曾到一次釋正興正興長老鹿湖下寶蓮室德水女居士皈依師專修淨業戒行堅固以念佛為常課民國五年時五十二歲在寶蓮室居住民國十九年昂平大茅蓬寶蓮寺紀修和尚傳戒當首席尊證阿闍黎計居寶蓮室二十一年自課教人皆以念佛修淨土為務不雜禪定教相具足信願行三種資糧至七十三歲念佛而逝安詳自在並無苦况荼毗後得舍利子大小五十餘粒分別有黃緑白金及古銅五種色彩各處善信乞取供奉現今寶蓮室尚存十餘粒奉為至寶釋靈峰靈峰禪師民國初年來大嶼山結石岩於昂平彌勒山腹上蓋小屋號曰天平虔誠苦行在此參究禁足不下山臨終自知時至先一日催促木匠為其做木龕一座說明天要用不得誤期木匠如期造就乃依時而歿荼毗後得舍利七十餘粒釋悅明悅明長老大悅頓修悅明三位禪師是昂平大茅蓬開山功行大德臨終時對人云待十年後再來此山圓寂入龕數天後鹿湖下靈隱寺有某禪師登山至昂平在至止亭與長老相遇當時不知其已圓寂道左相逢問其何去長老云往南京寶華山隆昌寺某禪師到昂平對人云及長老往南京事始知其已經圓寂入龕數天所遇者乃其化身人皆嘖嘖稱奇釋遠參遠參老法師原籍廣東吳川高氏子幼而孤年十五遂溪東華山靜齊和尚見其天資聰穎度其出家年十八往鼎湖山慶雲寺受戒翌年往羅浮山延祥寺親近妙參和尚年二十二發心至江南名剎參學隨月霞法師及度厄法師研教理暇則自修閲藏初覆講小座滔滔雄辨深為月霞法師所器重命其代座講經由是漸露聲名講席遠遍各地現居大嶼山東涌地塘仔葩嚴閣靜室而年中在各處講席不輟年逾八十猶精神矍鑠人有所問莫不樂答焉釋海仁海仁老法師原籍廣東中山南門沙岡陳氏子少時因看爭鬥小說請如來佛祖分解因此覺得佛之人格偉大光緒三十一年年二十乃發心出家依述蓮和尚在羅浮山華手寺居住年二十三在羅浮山華首台受戒年二十四游江浙地方參學初聽慧明老法師講法華經宣統二年在天童寺聽佛乘法師講楞嚴經民國元年到揚州高旻寺親近楚泉法師參禪過冬民國二年在杭州靈隱寺聽諦間法師講楞嚴經是年秋有同學十人請湖南證因法師教授楞嚴至冬在上海哈同花園聽月霞法師講摩訶般若與遠參法師增秀大師為同學民國三年隨月霞法師往九華山冬崖下院聽地藏經及金剛經是時遠參法師代座民國四年往安徽迎江寺閲藏經一年民國五年在高旻寺禪堂過冬民國六年在江蘇磬山聽月霞法師講法華經又在高旻寺過冬民國七年往常州天寧寺聽湖北元藏法師講法華經是年返港與性蓮和尚同住昂平阿彌陀佛靜室民國八年應澳門塔石善信之邀初講楞嚴經其後在元朗觀音山紫竹林新界沙田廣州中山等處地方繼續弘法又在韶關丹霞山講梵網菩薩戒品現年七十一說法四十年有奇講經數百會虔誠苦行戒律精嚴教授後學循循善誘孜孜不倦曾任香港佛教會理事長不慕名利供養堪為末法時代僧人模範釋海山海山老法師現年六十七原籍湖北黃陂俗姓陳年十七隨父商於河南開封居近相國寺時入寺遊觀見僧衆課誦念佛有感於衷慕出家修行能脫煩惱遂投該寺住持性空和尚出家法名清晏字海山次年十八往南京寶華山慧居律寺受具足戒年十九至終南山親近金山長老慈本老和尚學禪習教以後往天寧天童及北京紅螺各大叢林參學三朝四大名山十禮仰光大金塔及暹羅緬甸印度錫蘭等佛跡民國三年在上海哈同花園華嚴大學親近月霞法師求學在緬甸請購玉佛兩尊每尊高四尺重八百斤回國供養一在開封鐵塔寺一在洛陽白馬寺曾在南北二京及蘇杭二州弘法多年講經數十餘座近八年來在港九大嶼山等處集團打華嚴佛七十餘次居大嶼山薑山觀音廟將該廟重修改為觀音殿又在鯉魚門創華嚴閣佛堂著有華嚴堂隨筆一冊行世釋增秀增秀和尚原籍廣東開平黃氏子年二十二發心出家於廣東肇慶七星岩大覺寺禮建初大師為師光緒三十一年往鼎湖山慶雲寺求具足戒至宣統二年是年二十七鼎湖山壽安和尚傳法為慶雲寺宗派即在寺任維那知客等職事民國二年往浙江省寧波天童寺參禪二年轉往上海哈同花園華嚴大學聽月霞法師講大般若經是時與遠參海仁兩法師為同學講經期完滿後復回鼎湖山當知客民國十二年在香港新界大埔馬窩山創建蘭若園精舍至年六十三在新界慈航淨苑掩關原以三年為期由二月入關至八月間忘餐廢枕靜坐中忽然有醒悟出古德說偈曰修行無別修貴在識路頭路頭若識得生死自然休是時連說忽然捉得個老賊看真原來王大伯今次親見認識渠從今不被他迷惑可惜這種境界霎時輕安而翌日依然故我心中懊悔當時作有所得至十二月間聞說鼎湖山常住發生諍鬥不得已解關返鼎湖兩造調停以息諍訟是時廣州佛教會及高要縣官紳等舉為慶雲寺住持年六十八在大嶼山寶蓮禪寺戒期中任羯磨阿闍黎筏可和尚於戒期完滿後退休衆請其任住持一年後遂告辭今已七十三高齡尚健談不倦釋明觀明觀和尚原籍湖北生於光緒十七年喪父母年十六隨兄貿易辛亥武昌起義入湖北陸軍工業學校攻讀民國三年往南京聽度厄世航法師講彌陀經要解厭離塵俗禮九華山百歲宮開忍老和尚出家民國四年往寶華山求具足戒回南京隨度厄法師聽講楞嚴經正脈習學教典民國五年冬往天寧依冶開老和尚參念佛是誰茫無頭緒民國六年往鎮江金山過夏結冬打禪七坐中有省覺禪宗妙義不可以心思言解舉此面陳方丈性融和尚和尚示斥云點水不足奇波浪尚未息海底透明月萬象一般齊不到萬年一如不可放過謹防無始習氣招波作浪有性命之關子細子細民國七年由金山過夏至焦山聽月霞度厄兩法師講楞嚴與常惺墨庵祥瑞靄亭諸法師為同學是年往高旻寺過冬復舉金山前事經過面陳堂頭楚泉老和尚老和尚又斥云凡情聖解不斷休談工夫淺深一日無常來到心中自生驚怕人法未忘總是生死途徑放下又放下去參民國八年來果和尚住持高旻寺又往親近復敘此事和尚云懸崖一事進退兩難虛空落地時請再來談民國九年往西天目山親近歸元老和尚又談前事老和尚云大道在目前如何眉不見祇因未拖地兩眼看青天古人說道非是道去參民國十年往江西雲居山親近九參首座言談生死亦復如是民國十一年在雲居山聽慧明老法師講楞嚴學覆講民國十二年往終南山親近華嚴老人居湘子洞至民國十四年同葉荃居士往北京民國十五年朝五台山與力宏和尚蓮生師等闢太原雙塔寺為十方叢林民國十七年與了願和尚重建馬祖第一叢林民國二十一年往福建鼓山依虛雲和尚民國二十三年虛雲和尚往南華重興六祖道場受命代理寺務民國二十五年在浙江閉關禮拜華嚴經一部一日靜坐中忽見一童子亦禮拜倏然不見不可測量是聖是魔民國二十七年出關朝天台山靜權老法師命講彌陀經民國二十八年開建明岩寺寒山拾得勝蹟功程浩大尚未完滿民國三十七年即接虛雲和尚來函委任廣州六榕寺住持因此放棄明岩寺往粵就任翌年九月廣州解放十月來港雲水荃灣芙蓉青山大嶼間寶蓮寺筏可和尚請為首座領衆坐禪民國四十五年得各檀越資助在荃灣三叠潭建造靜室修養現在動工程中說到禪宗無邊涯岸豈可一言談云釋復仁復仁老和尚原藉廣東大埔縣王氏子年二十六往暹羅營商七年是年三十三忽悟世無常在暹京甘露寺禮盧慶和尚出家民國十年發心往寧坡天童寺求受具足戒文哲律師為得戒和尚隨住天童寺禪堂一年學參究翌年回暹京與廣東藉同參師友四人往朝五台山聽戒乘法海師講楞嚴經全部民國十四年往揚州高旻寺禪堂過冬親近來果和尚安單在禪堂樓上半年樓上原有佛前琉璃燈一盞有一晚睡後萬籟俱寂平時此燈若睡在單上係看不見者是晚忽見此燈大放光明心知了了並無對人言及第二天來果和尚在堂內開示發心修道之人用功參究若見光明境界不是燈光乃是自心所發之光等法語當時以來果和尚開示默契己事乃更加精進往返鎮江金山江天寺與揚州高旻寺連住六七年任高旻寺知客一期往焦山定慧寺聽仁山老法師講楞嚴經轉往蘇州靈岩山任知客二年聞虛雲和尚在福建鼓山湧泉寺大展宗風遂往親近虛老住禪堂由堂主升至後堂民國十九年福建初成立人民政府寺內糧食缺乏受虛老命兼任化主職務往廣東化緣遇張壽波居士即觀本法師海仁法師青山寺了幻大師三人熱心贊助提倡募得粵幣數千元返鼓山救濟糧食虛老又命往南洋一帶化緣適暹羅隆恩寺大衆懇請任住持十年至民國二十九年虛老派寬鑑幻齊兩位大師來暹請回粵北韶關南華寺在戒期內當傳戒和尚為虛老和尚嗣法門人又回暹羅居住至民國三十一年虛老往重慶主持開息災法會是時海道不通由暹乘車步行數月方回南華虛老任命代理住持職務至民國三十二年虛老回山正式任命進院住持至民國三十五年退任民國三十七年虛老命為廣東六榕寺住持辭不受命因往香港新界大嶼山寶蓮寺遊覽與寬鑑寬文兩禪師往東涌地塘仔有寬姑女居士因法林靜室被日軍戰時破壞願將全間送贈與出家人修養復仁和尚面見寬姑一說即合於是全間重修闢樓上作禪堂供大士像樓下作正殿供釋迦像每年建禪七道場最多為港九之冠現在六十九農禪苦行力行參究得傳法弟子多人剃度弟子二十餘人皈依弟子七百餘人有百丈禪師遺風云釋慧命慧命法師原藉廣東新會俗姓張與兄觀祖昆仲二人少年皆信佛其兄禮筏可和尚出家法師於民國草三年親近虛雲和尚面聆法要民國二十四年禮寶靜法師出家往南京寶華山受具足戒在浙江寧坡觀宗寺聽寶靜法師講摩訶止觀又在七塔寺聽圓瑛法師講金剛經又聽海仁法師講楞嚴經又在杭州雲居山聖水寺聽靜修老法師講法華經又在江蘇常熟寶岩寺華嚴大學聽應慈老法師講華嚴楞伽等經又在上海圖明講堂聽圓瑛法師講楞嚴綱要又在法藏寺聽靜修老法師講教觀綱宗回港後住大嶼山寶蓮寺在嶼山佛學院初講教觀綱宗戰時往廣州灣在清涼寺及持名靜室講金剛法華等經光復後在廣州普慶堂講法華經返港仍居昂平寶蓮寺在娑羅精舍講金剛經又在靈隱寺講金剛經維摩經及普門品對於禪宗公案與教相悉心研究極有心得說法流利如倒瀉軍持每逢開示講說皆引經據典一氣呵成並無拉雜拮掘等語病聽者願樂欲聞生平依法不依人現在寶蓮寺禪堂當堂主職事最貴古德真參實行不肯隨聲附和及妄許時人以為證悟云釋筏可筏可老和尚寶蓮寺十方叢林第二代住持原藉廣東南海西樵李兆文哲嗣童時穎達天資聰敏年十歲就外傳祖父病重將易簀時其母囑其多見祖父一面過此再不能見矣由此感覺祖父死向何處去默坐思惟數小時疑團不釋至十四歲隨母舅往暹羅偶遊佛寺心生歡喜非常戀慕因水土不服患腳氣病迫得回鄉醫理數年始愈痼疾但心中常想佛像莊嚴及寺內清淨生活出家之念由此發生暇則訪尋出家處所以何地為勝恰至穗垣白雲山能仁寺詢問有某大師告以西江鼎湖山及東江羅浮山二處最勝於是出家之願更為堅固不告父母潛至鼎湖山遇鑑航大師乞求剃度鑑航大師以其志誠許之遂留寺中作務其父因子離家不返倩人向各戚友處訪尋均無踪跡某日忽接其子由鼎湖來函說明出家志願其父得函後喜從天降刻日買舟西上肇慶在廣利墟羅隱涌後瀝駁艇中適父子相見同返鼎湖與鑑航大師商洽接子回家鑑航大師以佛制有父母不聽不許出家之明訓翌辰乃命隨父同返西樵父母戚屬多方勸導頻揮老淚動以人子之情殊難阻其出家志願其老祖母洎父母等以不能挽留乃聽其再返鼎湖山正式依鑑航大師至南江九江半角寺剃度取名念恩號筏可民國元年冬期在鼎湖山求穀林老和尚受具足戒當丈室侍者常聞穀老談說鎮江金山江天寺及揚州高旻寺之禪門宗風意義心焉嚮往乃要求鑑航大師准豫看佛經鑑師乃檢出沙彌律儀及金剛經五十三家注解等令其閲讀暇則閉門靜坐以調身心某日當閉門靜坐時覩見門外丹墀水缸邊緣有甲蟲動物跌下水中忽然醒目開門一看果見甲蟲動物淹在水中乃將其救回生命自此更加精進穀老乃提升其在客堂庫房當要職務民國三年甲寅歲西江滌堂圍崩決江水泛濫漲至羅隱涌鼎湖下院公家派出客堂隱林師雲房鉢多師及庫房筏可師三人乘小艇同往磡驗水漲情形在崩圍處忽然水勢起旋將小艇冲出崩圍之外最奇者以後三人連續卜杯輪當住持民國五年春因緣時會隨同融秋和尚茂峰法師靈禪大師一行四人往外省參學融秋等三人到龍潭寶華山隆昌律寺受戒筏師自往鎮江金山江天寺請求入禪堂隨衆參禪二年往天童寺聽慧明老法師講大乘起信論圓滿後往朝南海普陀山遊遍前寺後寺及佛頂山各處勝境返上海海潮寺親近微軍老和尚過冬共住二年至民國十年春正月與融秋靈禪二師發心同朝五台山自天津步行至北平龍泉寺稍息月餘再步至南口經居庸關及平型關行腳二十餘天始抵五台初朝東台至北台西台南台中台各處道場俱供奉文殊菩薩有普濟勞蓬及顯通寺即原日華嚴寺清涼國師道場約住月餘回時經龍泉關至定州乘車返北平龍泉寺偶染小恙在此閲經愈後乘船返上海見微軍老和尚挽留不住乘船返廣東鼎湖山慶雲寺仍在客堂任職至民國十三年到香港遊新界青山屯門在樨香園現改清涼法苑附近購地建小靜室潘達微老居士為其題額如是住在此閲經坐禪至民國十四年觀音山凌雲寺請湛芬笑航兩法師每日輪講楞嚴經受命當維那十餘天適順德大良寶林寺派員禮請湛芬返寶林寺進院住持妙參和尚及聽衆等請其代湛芬法師講座聽者欣然後應青山寺講楞嚴經全部至民國十九年大嶼山寶蓮寺紀修老和尚傳戒完滿自行退院由紀老及觀清妙參顯奇等諸山長老公請任寶蓮寺主席迎請父親李兆文在山供養向紀修老和尚受五戒法名慈雲居山五年身故又度其胞妹及甥女出家民國二十年應中山弘法社聘請講地藏經以後共往中山四次弘法民國草二年青山寺顯奇老和尚圓寂監寺了幻及兩序大衆請任青山寺住持是年廣州懲戒場莫主任親請赴廣州監獄為犯人說法謝英伯老居士等繼請在廣州六榕寺講大乘起信論以後在廣州弘法講經五次民國草三年安南西貢隆河法華寺傳戒請當說戒和尚回港後創嶼山佛學院民國草七年鼎湖山慶雲寺卜杯住持當選由鼎湖派大師二名到港迎請往鼎湖進院是時中日戰事蔓延各地思惟鼎湖乃祖師門庭不容卸責乃間關運路而往當進院後翌日即有山下工專學校現駐稅警團鐘團長親率團警上山將寺圍住强請方丈往團部有事商量是時寺內正當新舊住持交接數目之際以情形嚴重只得隨往團部聽候質疑據團部謂接有函告密說鼎湖山新住持有與日人通謀嫌疑必須查明辦理不准保釋在團部羈留七天解往肇慶潮龍廟鄧龍光軍部臨時拘留所旋得南華寺虛雲老和尚面謁省長李漢魂致電肇慶軍部開釋回復自由返鼎湖山在寺內講溈山警策約半月時肇慶軍部開僧道尼追悼陳亡將士大會函邀住持親往參加昔為階下囚今作座上客不勝感慨係之軍部透露此次告密函件乃寺內人所為於是决意捨棄慶雲寺住持職務由肇慶經白土高明開平由四邑三埠返香港寶蓮寺即致函鼎湖退居民國三十年日軍占領香港山中糧缺雷州人士請往廣州灣持名靜室講彌陀經為山上及青山大衆請命化緣約得五千港元匯港救濟糧食由廣州灣經澳門返港至光復後任香港佛教聯合會會長繼海仁倓虛茂峰顯慈諸法師等就任四次公元一九五六年世界各地舉行佛曆二千五百年紀念香港佛教聯合會改董事制首任董事長是年夏令應檀香山中華佛教會邀請前往弘法約期七個月至一九五七年三月返港大嶼山寶蓮寺計每年在各處講席不輟每日誦金剛經為常課寒暑無間斷自奉儉約律己甚嚴有餘資則建築堂舍及創辦佛教教育事業在家出家四衆皈依弟子數萬人著述有心經講要及十善業道經講義中英文本行世僧行高潔不趨炎附勢淡泊為懷不求名而名自至不受福而福常隨現年六十五望之如四十許人其弟子明慧祝五十八華誕時為畫像贊云三山作方丈五苑領禪林德在人天重機緣歲月深千年松鶴骨萬壑水雲心賴有羣生願普門演法音自被薰風化難忘塵剎恩大悲勞父母得力愧兒孫癸巳諸天耀庚寅冬日溫年年龍象祝歲歲法庭尊岑學呂老居士為其朝五台山題詩云此行莫問幾時回北去應須到五台若遇文殊放光處殷勤為我記歸來釋定佛尼定佛老尼原藉廣東中山陳氏女即海仁老法師姑母老法師有姑母五人三人信佛年十八禮浙江普陀山老和尚出家曾朝禮各大名山遇有講經法會必親往聽又發心往日本留學佛法多年回港後在東涌地塘仔首創楞嚴壇現已毀去度出家女徒衆十餘人在家皈依者千餘人喜結人緣後在昂平致志蓬靜室修養某年在港參加某檀越送殯因天氣炎熱感暑入陰急回昂平致志蓬痛苦不堪當時急延大澳名醫薰南先生到診細切脉理决其是晚不治到酉刻時分在臥床忽起結跏趺坐命人為其束褲腳對人云來生再到此坐道場說後乃念佛合掌而逝生平對香港佛教有六事可紀一始創請佛乘法師初在廣東講經二最初發起在香港澳門打佛七三初在香港修結界大悲懺四由先天道最初轉皈依三寶五初以女傭身份出家六少年有丈夫出家釋儀真尼儀真尼法師原藉廣東中山俗姓楊即前清光緒舉人揚鐵夫胞妹年三十五披髮入山在昂平建栴檀林靜室民國五年向觀音山凌雲寺禮定修比丘尼出家民國六年往鎮江金山江天寺受具足戒在江蘇圓通庵及上海同善堂居住二年返港住凌雲寺後回大嶼山昂平常住栴檀林好坐禪念佛禪淨雙修曾親近遠參海仁佛乘顯慈筏可諸法師聽經暇則閲藏以貫通融會年五十七洵山上各女衆請求在栴檀林講楞嚴經大勢至圓通章以後隨講各大乘經典手編楞嚴懺儀一卷行世現年七十七猶講述不倦釋福修尼福修老尼廣東順德人妙忝老和尚女弟子民國七年來大嶼山在昂平建合德堂靜室民國二十年又建圓溪靜室生平寡言笑禁足不下山日誦金剛經為常課寒暑無間斷至一九五六年元月初三日圓寂年七十二臨終自知時至對人說偈云間遊舉步到嶼山溪水琴音晝夜彈四大分尸無可挽向西而去不宜還說畢安詳而逝五居士龔芳齊龔芳齊先生前清監生其遠祖由渤海落籍大嶼山二澳村世代以務農為業傳至第七世即芳齊先生耕餘課讀設孰授蒙中年遊泮光緒庚戌科應省舉入闈考試原已中式唱名時因報籍貫在大嶼山二澳村主考官以其鄉貫屬於山僻草野之地向無文名乃將其名列取消掉換別人祗得抱監生銜以終老民國改元後賫志林泉恬淡自居善擘窠大書筆法遒徑薑山觀音廟蓬瀛古洞四字即為其手題壽屆遐齡安詳而逝楊鐵夫楊鐵夫居士原籍廣東中山人書香世胄乃昂平栴檀儀真比丘尼胞兄年三十登光緒科舉人民國改元不求仕進淡泊名利到處朝禮名山如寧坡育王鎮江金山揚州高旻等各處名剎多有墨寶留刻生平好念佛行住坐臥不離十八顆串珠虛雲和尚住持福建鼓山湧泉寺時親往求受居家五戒至民國二十五年時年七十來大嶼山栴檀林在東涌地塘仔買地建靜室一幢初名桐廬後改雙樹居世壽七十六一生著述豐富道德文章為人推重惜遺稿散佚無存霍仁生霍仁生居士廣東南海人年十八在香港皇仁書院肄業時偶探友在書房見西湖佳話一本內有蓮池大師放生善蹟一段內載七筆鈎覺得人生如幻如化一切名利皆虛妄不實由此覺悟我佛喚醒世人不少迷夢以後遇有法師講經必隨喜參聽又廣購佛教經書研讀漸有啓發至戰前虛雲和尚在韶關南華寺傳戒因是發心前往皈依求受五戒法名寬仁字佛生向來隨喜作佛事喜遊名山勝蹟曾到十三省地方如浙江杭州淨慈寺靈隱寺天竺寺理安寺虎豹寺玉泉寺上海玉佛寺靜安寺南京雞鳴寺毗盧寺北京廣濟寺雍和宮西山臥佛寺碧雲寺廣東鼎湖慶雲寺羅浮華首台丹霞別傳寺潮州開元寺及蘇州寒山寺蕪錫惠山寺遠至吉林省及各處名山大川皆喜遊覽少年畢業於香港皇仁書院及香港大學曾任元朗博愛醫院主席及徽遠中學校長現任安樂汽水廠及新亞酒店董事