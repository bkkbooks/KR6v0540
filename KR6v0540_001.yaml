雄渾百餘年前徐姓人葬父墳於山腹纍代發出巨富後來子孫與人不睦被人偷掘墳內將金塔移去遍尋不獲而家道從此衰落後得先人示夢始尋回金塔安葬如故云田螺古墓在鹿湖與薑山交界處四面皆山下凹如湖中有土阜突起形如田螺時人名為田螺山清咸豐年間大澳石仔埗村人鄭榮祥得地師指點在山後石板下葬父墳於此名為田螺篤鄭氏由此以武辨起家纍升至江南千總提督當時榮歸娶媳御賜匾額題奉旨下馬四字懸於家門並重修各處古廟均有碑為記民國十三年大澳鄉紳吳光輔遷葬其夫人鄭氏於田螺山之陽並親立寶鑑以囑後人云蓋卜地葬親乃慎終之事而子孫世澤皆出其中則人道之所以終即為人道之所以始也如樹木者然根本得氣而枝葉皆榮根本先撥則枝葉皆萎然則人之窮通壽夭實由葬地之吉凶余因有鑑於此擇地之心益切遍請堪輿頻年奔走始將先室鄭氏葬於大澳黃枝貝山斯時余司大澳藥肆事適劉醫生亦彭君因避亂而來余延之懸壺藥肆中劉君得先君之祕傳好談風水遂偕往觀鄭氏之壆劉曰龍來斜歪不成穴面對峰巒惡曜侵立向兩宮皆雜亂改遷不速禍將臨余不以為然來年春間果損丁劉為我憂遂尋龍審脈幾經勞瘁已越月矣始於薑山村土名螺山扞得一金穴曾訂之曰龍從鳳凰山出脈飛走數十里穿帳過峽至鹿湖而起少祖開屏開帳鶴膝蜂腰轉關起伏飛舞而來到薑山則穿田過脈顯然貴格之龍臨結地乃突起金星恍似響螺之象兩面奇峰成掛榜四圍玉帶水纏腰後座錦屏環拱衛前方天馬特來朝旗山秀處貴人地帽嶺尖圓祿位超立向庚申風水渙坐位甲寅雷火豐俱用三爻變震巽長男長女夫婦宗子午峰莊乾坤卦甲離庚坎亦相同卦運相生河洛合八卦全爻八卦通陰陽配偶人難識生生不已在其中云云三梵剎鹿湖精舍由大澳至昂平在鹿湖村恰一半路是處羣山環繞中凹如湖昔有野鹿遊於此故名曰鹿湖沿山滿植松林枝柯交翠面對薑山沿嶼山初地登山右上竹林深處有小亭曰至止由亭邊山路迤邐直上山坡有石崖刻鍊行兩個大字再上迎面有大石一方高約二丈刻發菩提心四字石牌後有小亭一座曰息肩亭再行數十武即見土丘上有六角亭亭向對面繞以圍墻門首有洞門二字入內即鹿湖精舍洞門聯云一輪明月開丹竈八面青山映鹿湖初創時原名純陽仙院乃羅浮道士羅元一於光緒九年在此開山創建有正殿及普雲院兩大座正殿左有客堂右有祖堂普雲院乃女士清修之所正門石刻橫額純陽仙院四字乃閩浙總督何璋題正門刻聯云緱嶺分踪雖處天涯皈淨土嶼山寄跡獨超塵界峙中流廣東狀元梁耀樞書入正門左邊勒石碑云欽加同知銜特授廣東廣州府新安縣正堂加十級唐調處廣東大鵬協鎮右營守府閩粵南澳鎮右營守府賴為出示曉諭事照得昨據該耆紳呂景輝等呈稱在於大嶼海島之鳳凰山鹿湖洞創建純陽普雲仙院二座復據呈以該道院鳩工告峻懇請再給示諭以杜奸邪而潔仙院等情查該紳耆所請懸為尊崇道教詢屬出自誠忱應豫照准合就出示曉諭為此示諭該院住持及軍民人等知悉道山乃清淨之地道果本修持之居固不容于褻穢亦不任于勾留外住僧道偶遊到院不准借居住宿不得留連竟日來往客旅亦不許久住棲遲恐其中有因事敗逃名藉偏僻之區以慝其罪者有之有扮作遊人先為借宿飄竊財物各亦有之爾住持務應持躬修己留心伺察倘有形跡可疑者速行驅逐並有斧伐山林與及牧童飼牛踐踏污泥挖石等弊如敢呈惡不遵故意勾留刁抗者該住持一面鳴官以警奸邪而淨福地各宜凜遵毋違持諭光緒九年十月草四日示紳士陸師彥黎斯治羅名丁呂景輝值事源顯之梁耀焜蔡星樞鄭世安羅鳳南蔡明住持羅元一等同勒石有觀清法師者久在鎮江金山寺與揚州高旻寺參禪多年回粵後結茅庵於羅浮山安居爾時該處土匪猖厥不堪騷擾法師於民國初年芒鞋竹杖到港至大嶼山大澳口虎山之地藏廟駐錫偶至鹿湖洞隨喜瞻仰羅元一道長對之一見如故知其是法器能人乃將鹿湖純陽仙院全部親交與觀清法師住持由此時起將道教改轉佛教所有院內制度儀式皆遵禪門軌範又將普雲院改作禪堂男女同參由是信徒皈依剃髮者不計其數逮後羅元一道長羽化觀清法師亦圓寂遂成女衆清修之所至一九五五年將禪堂重修改為念佛堂又將純陽仙院橫額改為鹿湖精舍同住女衆約百餘人每年四月十四日呂祖誕期舉行住持當家輪值云觀音廟由大澳嶼山初地登山沿山腳轉角至象山口有小亭一座亭前有路直上薑山中部有靜室五幢並立此即蓬瀛古洞以供奉觀音菩薩故水陸居民稱為觀音廟由宣統二年建築開山是葉善開女修士又名東姑右便題靜室之家四字正門有龔芳齊題蓬瀛古洞門額並門聯云蓬島擁祇園座鎮薑山開法界瀛洲昭勝蹟恩施化兩濟民生門內殿前有民國元年曾獻中長聯云蓮座擁慈雲佛法無邊參透自由真樂蓬瀛通旭日仙緣廣結修成獨立玄機另有黃伯臣民國二年聯云山水清音雲中一磬神仙福地天外三峰葉東姑原是先天道信徒初時洞內女修士俱依先天道制度初是護道其次皈依其次求道其次領天恩方能為人師表逮民國草九年葉東姑去世後至民國三十年張二姑蕭六姑及淨觀女士正式皈依寶蓮寺筏可和尚為三寶弟子由此將先天道制度轉為佛教民國三十一年歸蓉姑住持當家民國四十年有海山法師由大陸來港到大嶼山觀音廟各女衆等奉為住持民國四十二年將門面重修原日蓬瀛古洞橫額及對聯三付盡皆移去新題門匾為觀音殿靈隱寺在嶼山初地登山到至止亭亭之右邊一泓溪水長流其聲淙淙環繞高山形如蝙蝠展翼外有石橋通到山麓即靈隱寺門外韋馱殿繞以圍牆由韋馱殿下層入正門即見正殿四楹並立一連五幢自民國十七年由津微老大師開山建築將屆落成忽罹重病遂交託靈溪和尚住持由是農田種植四衆皈依者六七百人年內廣作佛事隨期傳戒增建地藏閣一幢次建吉祥居三層而住女衆又在山門口建韋馱彌勒殿又擬在對山建成就殿現尚規劃進行中靈溪和尚生于光緒十四年戊子俗姓凌廉州合浦人年十九於廣西博白縣覺岸寺出家依鼎湖山慶雲寺壽安和尚得戒受左山和尚傳法為曹洞慶雲宗派自題津微開山祖竹聯云全副肝腸臻築方成因退讓一條榔檐徵求靈意託維持皈依弟子黃湛題竹聯云靈隱高僧衣鉢真傳徒有愧溪流麻飯法壇常潔道無瑕英社行友贈聯云靈根參妙諦隱跡悟玄機民國十九年庚午吳道鎔題靈寺三字橫額並題門聯云靈資淨域隱證禪門如筏在靈隱寺最左邊民國草七年虛雲和尚皈依弟子梁敦普建現由融明大師住持呂恭巽題如筏二字橫額及門聯云如居極樂土筏作般若船明真隱樂在靈隱寺左邊一連兩間同時落成明真乃靈溪和尚弟子印西比丘尼建隱樂是淨清比丘尼建提舍左鄰明真隱樂右鄰靈隱寺門外欄河小樓憑眺一九五六年淨安比丘尼建少慈航在薑山瀑布下三義涌山窩處一九五五年廣信大師建西來意院在薑山觀音廟西邊一幢洋樓型一九五二年本覺大師與皈依弟子創建悟真在靈隱寺對面至止亭後便一連三幢門前花圃兩傍修竹四圍墻壁紅色又稱為紅屋民國十七年筏可和尚弟子淨徹比丘尼創建民國三十八年張德能女居士出資重修紫竹林在至止亭側左邊有英泥路拾級直上有靜室一座一連三幢即紫竹林民國七年法慧發心法常三位比丘尼於此創建室外餘地種植木瓜果樹收成纍纍人多爭購之寶蓮室在至止亭沿右邊登山處分三路入門此即寶蓮室分兩座建築中通水巷每座兩幢一連四間門前花圃蔭以修竹長松民國五年德水女居士創建一座至公元一九二五年交鏡德比丘尼管業一九三五年由鏡德比丘尼弟子悟真承管大事興建重修筏可和尚於牌門題寶樹蓮宗四字法華禪院在薑山對山斜坡處即鹿湖息肩亭右邊山麓有小石屋一間一九五四年精參大師由昂平村原有法華禪院遷移於此佛泉寺在鹿湖村與鹿湖精舍相連又稱為三寶殿民國草一年建四楹並立一連三幢美奐美輪乃番禺梁世新梁盧錦榮書橫梁正門三寶殿額題番禺梁硯田敬獻殿內橫額有佛自西來四字一九三三年英人許士德立古滇趙松雲書寺前柱聯云對此緑水青山能參般若問他黃花翠竹可悟禪機寺門聯云佛境自仙開仙境界即佛境界泉聲緣水覺水聲聞是泉聲聞殿前華園居士書聯云得掃三心空色相頓超四大證涅槃殿後黃子藝等恭祝信可德賢兩大法座長聯云佛法廣無邊入聖超凡近倚峯巒皆淨土泉湖清且潔明心見性遠瞻帆影盡慈航悟徹在鹿湖村左鄰佛泉寺右貼智積林門前花木扶疏一連兩幢民國二年觀清法師弟子德芳比丘尼與陳德樂女士創建門前聯云五百年來目前相識咨稱問千數載去背後荷擔是何人智積林在鹿湖村左邊悟徹三楹兩幢門前花圃蓮池珠柏四株亭亭如傘前有園門岑學呂題智積林三字並門聯云智若如愚入道先依八敬法積之以漸成佛皆由一念堅正殿門口鄒魯題聯云智海宏深普度羣生歸覺海積功廣大遍將衆善出迷津民國草一年順德大良比丘尼森荃師太於此創建現為了願比丘尼主理寶華園在鹿湖息肩亭山坡下便原日為松發林現為訪學大師所居故改今名一連兩幢門前果木繁茂頗饒幽勝寶樹林在鹿湖息肩亭直上數十碼右邊有石級向下平坡處一連有三間靜室即寶樹林淨如簷蔔林寶樹林於民國二十年乃大覺德覺近覺三位比丘尼創建淨如右鄰寶樹林左鄰簷蔔林民國二十年朗明比丘尼於此創建簷蔔林右鄰淨如左種修竹前面各有花圃一帶相通民國十七年淨純比丘尼創建一九五五年重修一座兩幢勝林在鹿湖村下坑三楹兩幢門面洋式前有花圃左右松竹交翠坑邊有小橋通過近連阡陌耳聽溪流水聲潺潺自然幽勝民國十七年證明比丘尼創建因勝大馬票得彩而建故號為勝林蓮花蓬在簷蔔林上便山腳民國草四年息通比丘尼創建覺修在鹿湖息肩亭左邊路上民國三十五年光嚴比丘尼創建隱徹在息肩亭左邊路上覺修後便民國十八年紹真比丘尼創建華嚴在隱徹後背民國二十年圓覺比丘尼於此創建門前刻聯云華閣見佛明佛性嚴樓參禪盡禪心覺廬由息肩亭路上鄰近華嚴民國十六年比丘尼普明老師太於此創建門前刻聯云頓超覺海三祗劫此是廬山五老峯慧蓮由息肩亭上在覺廬上層一連三幢民國十七年葉慧超女士創建一九五六年重修葉女士皈依寶靜法師禪淨雙修精卜易於港大笪地設道德堂代人決疑談言微中人多信之其徒衆約三十人以鍾梁二女士為入室弟子筏可和尚為其題門聯云慧日光明應如是見蓮華世界從聞思修普賢禪在慧蓮下層一連三幢民國草四年覺雲比丘尼於此創建門前刻聯云普念潛修化却紅塵求靜樂賢禪清潔逍遙經卷度韶光妙華禪在普賢禪左上便民國草二年德利比丘尼與定道女士同建同修在鹿湖智積林右背上民國三十六年淨光比丘尼與淨藏女士等六人同建寶華禪民國初年建築清雲老比丘尼於此開山一連三幢右邊為普賢禪前有花圃雜花生樹羣山環繞風景怡人清雲老尼專修淨業禁足不下山其弟子淨持為其題像贊曰吾師清雲幼而穎悟長即持齊心經是慕嶼嶺栖真我佛趨步明鏡菩提了徹有素年已六旬色空不鶩