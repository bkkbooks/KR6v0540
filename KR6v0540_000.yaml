  text: 大嶼山簡要圖筏可方丈編印大嶼山志昂頭寶剎平步蓮臺民國第一丁酉初秋順德伍蕃題蕃所作大嶼山志奉題本來如幻如泡影奚止滄桑幾變遷一自名山添記咏大漁千古峙南天丁酉蘇世傑蘇少偉筏可和尚道影寶蓮禪寺傳戒儀式寶蓮禪寺傳戒儀式寶蓮禪寺傳戒儀式大澳口將軍石大澳寶珠潭大澳石長橋薑山石牛鹿湖竹林深處水嘮嘈瀑布石壁古文石壁陳公哲石刻鹿湖六角亭鹿湖息肩亭傍石刻大風坳全景昂平海天一境牌門昂平攝度橋昂平蓮花石昂平法華塔法華塔旁石刻昂平華嚴塔華嚴塔石刻昂平羅漢塔昂平東山法門坑尾弘傳不朽石刻薑山瀑布鹿湖智積林薑山寶蓮室牌門薑山觀音殿鹿湖精舍正門靈隱寺正門薑山悟真紅屋鹿湖佛泉寺鹿湖慧蓮昂平覺蓮苑鹿湖竹園精舍鹿湖慧修院鹿湖法華淨苑法華苑佛殿昂平普明禪院側為覺道林昂平栴檀林昂平圓溪牌門昂平婆羅精舍寶蓮禪寺山門牌坊寶蓮寺大雄寶殿寶蓮寺兩千五百斤銅巨鐘寶蓮寺地藏殿昂平靜安居東涌蓮華臺東涌華嚴閣佛塔東涌羅漢岩東涌法林東涌古城正門東涌城左門東涌城右門大嶼山志目録序文一凡例五形勢七名勝將軍石一一寶珠潭一一海心石牌一二大澳運動場一二關帝古廟一三天后古廟一三龍巖寺一四嶼山初地一四雞翼角一五石響鐘一六石麒麟墓一六萬丈瀑一六石壁古文一六薑山瀑布一七貝澳海灘一七沙螺礦迹一七東涌古城一八侯王廟一八爛頭營一八銀礦灣一九梅窩礦迹一九東山法門一九大風坳一九海天一境二舍利塔二石鼓二石蓮花二鳳凰峰二一法華塔二一羅漢塔二一華嚴塔二二迓鷹角墳二二田螺古墓二二梵剎鹿湖精舍二四觀音廟二六靈隱寺二六如筏二七明真隱樂二七提舍二七少慈航二八西來意院二八悟真二八紫竹林二八寶蓮室二八法華禪院二九佛泉寺二九悟徹二九智積林三寶華園三寶樹林三淨如三簷蔔林三勝林三蓮花蓬三一覺修三一隱徹三一華嚴三一覺廬三一慧蓮三二普賢禪三二妙華禪三二同修三二寶華禪三二竹園精舍三三慧修院三四法華淨苑三四妙法三五寂光三五碧雲院三五羅漢岩三五南華苑三六靜隱三六竹林三六葩嚴閣三六菩提苑三七蓮華臺三七法林三七雙樹居三八佛光園三八回瀾小築三八蓮苑三八普明禪院三八合德堂三八覺道林三九蓮池精舍三九悟覺三九栴檀林三九沙泉四竺覺蓬四靜安居四圓溪四淡如西四仰德四天平四一妙香林四一阿彌陀佛四一慧明四二般若殿四二靜悟林四二娑羅精舍四三了塵樂四三義和蓬四三聯善堂四三菩提閣四三致志蓬四三淨覺四四小金山四四蘭若林四四淨念佛四四窮苦樂四四蓮苑四四新築園四四阿彌陀佛林四五如光四五覺蓮苑四五寶蓮禪寺四五禪德釋紀修四八釋妙參四九釋慈謙五釋正興五一釋靈峰五一釋悅明五一釋遠參五二釋海仁五二釋海山五三釋增秀五四釋明觀五五釋復仁五六釋慧命五八釋筏可五八釋定佛尼六二釋儀真尼六三釋福修尼六三居士龔芳齋六五楊鐵夫六五霍仁生六六林楞真六七法制寶蓮寺同住規約六八禪堂規約七講堂規約七三厨房規約七五念誦規約七六祝釋迦佛誕儀式七八祝釋迦佛成道七九釋迦佛涅槃儀八藝文寶蓮寺同戒録序八二佛法與平等八三遊寶蓮寺排律八八夜探鳳凰行八九鳳凰山觀日出九大嶼山昂平八景九遊寶蓮寺留別九四夜宿寶蓮寺九四登華嚴塔九六山居除夕九六送筏可和尚赴檀香山弘法九六和梁隱盦居士步栯堂禪師山居詩四十首原韻九七至一八大嶼山初志序天下名山莫不有志以記其事而名山之內莫不有寺觀以輝映其間由是名流題詠名山因而生色而名勝古迹於焉相得益彰主事者修成志例亘古相傳永垂不朽矣大嶼山古稱大漁原屬廣東新安縣雖載縣志而語焉不詳稽其最初發源開村似為東灣石壁是處地接馬交一海相隔帆檣可達在宋南渡時人迹初至明清以降漸次開拓各村大部份居民多為漁樵農牧而縣治乃於東涌灣及雞翼角設城壘以禦寇焉近半世紀以來滄桑變易最高原之昂平東至鳳凰山地塘仔西至薑山鹿湖已成為梵宇精舍叢聚之區大東山爛頭營列為外國人別墅之處大澳梅窩兩處口岸新築碼頭小輪來往香港交通便利中外報章疊載多紀本山勝槩衲住持茲山寶蓮禪寺垂三十載每逢遊旅來山多以故迹相詢蓋本山主山拔海三千餘尺四面環水昔為蠻煙瘴雨今成郊遊勝地民風古朴堪媲世外桃源又豈可無志以紀之乎明慧法師從衲出家二十餘年曾經朝參吾粵西北及閩浙蘇洛湘鄂各處名勝工書博藝而修持不循常軌衲於客歲夏令應檀島中華佛教會邀請弘法在山上敘別之時命其輯此山志以留常住於半年間博訪周詢考核大嶼山所得目為形勢名勝梵剎禪德居士法制藝文分門別類編而成志在昔年湮代遠欲詳載而無從今者遊目所經尚彙集而可及幸冀諸山龍象海內名流覽斯志者不吝珠玉有以匡正之務止於至善顧大嶼山名因此全彰法門宗風由斯遠播今付梓之初略序數語於篇首以發凡焉佛曆二五一年歲次丁酉初夏筏可序於大嶼山寶蓮禪寺如是丈室大嶼山志序大嶼山屬寶安縣舊稱新安四面環海距縣治頗遠昔為龍蛇窟宅之區海盜逋逃之藪惟漁民利其出海方便艤舟海濱乾嘉以前人迹罕到自鴉片之役清割香港與英繼而租借九龍新界而大嶼山始為英人管轄之區是山東起銀礦灣西迄大澳市南至唐福水口北至東涌沙螺灣土瘠山多中鮮可耕之地以故迄今人口尚稀山之西北高原有昂平村四圍羣山環繞中成盆地故曰昂平地勢左擁鳳凰右依彌勒形勢渾雄風景優美初有大悅頓修悅明諸禪師喜其不邇城市足供清修相與結廬於此嗣紀公老和尚遙從鎮江金山江天寺卓錫南歸暫駐鹿湖邂逅心空明新悅明諸長老懇其上山願獻昔年靜室擴作十方叢林請紀公主持其間命名寶蓮禪寺由是建木屋作禪堂繼營大殿佛相莊嚴振宗風轉法輪領衆匡徒規模漸具民十九庚午傳戒圓滿紀公自以年高退席延請筏可和尚繼續住持筏公以紀老建五觀齋堂尚未完成乃鳩工庀材刻日成之增建韋馱彌勒殿在山前建妙湛總持牌坊山後建羅漢塔寺前建法華塔毗連大殿左側建金剛窟禪堂又建地藏殿指月堂殿前左右兩亭寺左華嚴塔等詳寶蓮寺條附近廣植松林增闢花圃邇為謀農田水利又建水塘一口寺之田畦悉資挹注力倡僧侶農禪生活期能自食其力從此山門日臻光大蓽路藍縷垂三十年考寶蓮寺登山途徑一自東涌沿鳳凰山之陰而西進一由大澳向薑山鹿湖而北行昔日山路崎嶇行人稱苦近以歷年修理漸見康莊惟路繞山行屈曲紆斜在所難免自大澳登山沿途勝景頗多薑山飛瀑鹿湖古剎足供留連逮登襟海亭即見海接蒼穹水天一色帆檣如畫山花迎人凝眸四顧地悉平坦稍進寶蓮禪寺即在目前昂平八景漸次入望窣堵紛陳招提並列豁人心目氣象萬千是地朔風凜冽而瑞草紛芳霜露紛飛而名花競放白雲凝布奪萬里之澄江杲日初升見一泓之碧海昔人云天下名山僧占多其然豈其然耶山門創建四十餘年向無山志丙申夏筏可和尚應騁遠渡檀島講經堂主明慧法師受命編輯嶼山初志四出採集博訪周咨窮數月之力始抵於成從此山以志而益彰人以志而永傳書成付梓余不揣譾陋謹書其梗概如此佛曆二千五百零一年歲次丁酉釋智照撰於寶蓮寺雲深處大嶼山初志總目凡例一形勢本山分地形山嶽山峽平原道路村落海峽海灣泉瀑池塘礦質生産居民及沿革史以存文獻二名勝本山初輯志例徵引書籍闕如故名曰大嶼山初志古廟碑文擇要録之各處勝迹共三十三特為點出以供遊目三梵剎寺宇靜室各皆注明地點及開山年代與創始人等計招提蘭若共八十四以存史實四禪德出家之比丘比丘尼通宗通教者皆為詳紀或遺留舍利及有靈應者應豫表揚五居士在家之優婆塞優婆夷外護佛法崇興福力者皆應紀之六法制附録叢林規制及祝佛讚儀以播宗風七藝文有關本山之論文詩歌詞賦等概要採集增録於後編者學慚譾陋受命之初千頭萬緒最窘者並無參考書目只得竭盡棉力親歷其地訪問咨詢歷時半載草成稿秩有關梵剎之神話範圍俱不載入關於禪德方面首重實際記聞有浮誇之處略為刪減以求去妄存真本志就採訪所得托拾而成非敢云全志至於完成善本敬俟將來君子茲承霍仁生居士指示編纂及智照大師潤色文字暨熊偉明君報效攝影照片謹此志謝半角僧明慧附識
